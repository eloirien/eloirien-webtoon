    <script src="https://cdn.tailwindcss.com"></script>

    <style>
       
      /* Refined Stable Header Styling */
      /* Stable, Close-Proximity Header */
     /* Stable "Caged" Header */
      #page-title {
       font-size: 16px; /* Increased from 10px */
       font-weight: 900;
       letter-spacing: 0.8em; /* Slightly wider to compensate for size */
       color: rgba(255, 255, 255, 0.9);
       text-shadow: 0 0 20px rgba(59, 130, 246, 0.4); /* Stronger glow for hierarchy */
       display: inline-block;
       position: relative;
       margin: 0 auto;
       text-align: center;
      }
      
      #page-title::after {
          content: '';
          position: absolute;
          bottom: -15px;
          left: 50%;
          transform: translateX(-50%);
          width: 40px;
          height: 1px;
          background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      }
       
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: #E0E0E0; margin: 0; overflow-x: hidden; }
        
        /* Navigation Pill */
        .nav-container { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: center; padding-top: 2rem; padding-left: 15px; padding-right: 15px; pointer-events: none; }
        .nav-pill { pointer-events: auto; background-color: rgba(13, 13, 13, 0.95); backdrop-filter: blur(20px) saturate(180%); padding: 6px 16px; border-radius: 9999px; border: 2px solid rgba(255, 255, 255, 0.25); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); display: flex; align-items: center; gap: 12px; height: 42px; margin: 0 auto; }
        .nav-link { color: #9ca3af; text-transform: uppercase; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; transition: color 0.3s; cursor: pointer; }
        .nav-link:hover { color: #3b82f6; }

        /* Infinity Blur Background - 25px */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('images/branding/banner/silverstring-main-banner.webp'); background-size: cover; background-position: center; filter: blur(25px) brightness(0.2); transform: scale(1.1); }

        /* Responsive Article Room */
        .article-room { 
            width: 95%; 
            max-width: 800px; 
            margin: 6rem auto 2rem auto; 
            background: rgba(20, 20, 20, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
            padding: 3rem 1.5rem; 
            position: relative; 
            z-index: 10;
        }

        @media (min-width: 768px) {
            .article-room { padding: 5rem 4rem; margin-top: 8rem; border-radius: 40px; }
        }

        .section-divider { height: 1px; width: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent); margin: 4rem 0; }
        
        /* RESTORED: Glowing Comic Card */
        .comic-card { 
            background: rgba(30, 30, 30, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px; 
            padding: 1.5rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            gap: 1.5rem; 
            transition: all 0.3s ease; 
        }

        .comic-card:hover { 
            border-color: #3b82f6; 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); 
            transform: translateY(-5px); 
        }

        @media (min-width: 768px) {
            .comic-card { flex-direction: row; text-align: left; align-items: center; gap: 2.5rem; padding: 2rem; }
        }
    
        .comic-thumb { width: 140px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-shrink: 0; }

        /* RESTORED: Genre Tag Styling */
        .genre-tag { 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            border-radius: 6px; 
            padding: 4px 12px; 
            color: white; 
            font-size: 8px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        /* Language Dropdown */
        .custom-lang-dropdown { position: relative; display: flex; align-items: center; }
        .lang-trigger { background-color: rgba(31, 41, 55, 0.6); border: 1px solid rgba(59, 130, 246, 0.3); color: #3b82f6; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .lang-menu { position: absolute; top: 100%; right: 0; padding-top: 15px; display: none; flex-direction: column; z-index: 2000; width: 180px; }
        .lang-menu-content { background-color: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .lang-item { padding: 12px; font-size: 11px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #E0E0E0; border-bottom: 1px solid #1f1f1f; transition: background 0.2s; }
        .lang-item:hover { background-color: #2d2d2d; color: #3b82f6; }
        .flag-icon { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; }
        .custom-lang-dropdown:hover .lang-menu { display: flex; }

        img { -webkit-user-drag: none; user-select: none; }

         /* Teleport Button Logic */
         #back-to-top {
             bottom: -100px; /* Hidden by default */
             transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
             opacity: 0;
         }
         
         #back-to-top.show-btn {
             bottom: 30px; /* Slides up into view */
             opacity: 1;
         }
       
    </style>
</head>

   <body>

            <div class="h-4 w-[1px] bg-gray-800"></div>
            <a href="index.html" class="nav-link">home</a>

            <div class="custom-lang-dropdown">

                    <div class="lang-menu-content">
                        <div class="lang-item" onclick="setLanguage('EN')"><img src="https://flagcdn.com/us.svg" class="flag-icon"> English</div>
                        <div class="lang-item" onclick="setLanguage('ID')"><img src="https://flagcdn.com/id.svg" class="flag-icon"> Bahasa Indonesia</div>
                        <div class="lang-item" onclick="setLanguage('JA')"><img src="https://flagcdn.com/jp.svg" class="flag-icon"> 日本語</div>
                        <div class="lang-item" onclick="setLanguage('KO')"><img src="https://flagcdn.com/kr.svg" class="flag-icon"> 한국어</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="article-room shadow-2xl">
       
    <div class="w-full text-center mb-12">

    <a href="index.html" class="w-full max-w-4xl mx-auto p-6 md:p-8 rounded-[40px] border border-zinc-800/80 bg-gradient-to-br from-black/50 via-zinc-950/70 to-black/90 shadow-2xl flex flex-col md:flex-row items-center gap-8 transition-all duration-300 hover:border-blue-500 hover:shadow-[0_0_20px_rgba(59,130,246,0.2)] hover:-translate-y-1 group">

        <div class="flex-1 flex flex-col gap-4 items-center md:items-start text-center md:text-left">

                <span id="genre-drama" class="border border-white/40 rounded-[6px] px-3 py-1 color-white text-[8px] font-bold uppercase tracking-wider">Drama</span>

        </div>
    </a>
    
        <div class="section-divider"></div>
    
        <div class="w-full max-w-4xl mx-auto p-6 md:p-8 rounded-[40px] border border-zinc-800/50 bg-gradient-to-br from-black/50 via-zinc-950/70 to-black/90 shadow-2xl flex flex-col md:flex-row items-center gap-8 opacity-85 transition-all duration-300 hover:border-amber-500 hover:shadow-[0_0_20px_rgba(245,158,11,0.15)] hover:-translate-y-1">
        <img src="images/branding/covers/silverstring-special-cover.webp" alt="Silverstring Specials cover: Princess Alicia visiting Esvath at the 'Eden' greenhouse during a warm afternoon. Alicia, with her pink-white ombre hair, is smiling as she holds a freshly picked flower branch, while Esvath opens the greenhouse door for her. The scene is filled with lush flowers and bathed in a soft orange and green sunlight palette." class="w-36 h-auto rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] flex-shrink-0">
        <div class="flex-1 flex flex-col gap-4 items-center md:items-start text-center md:text-left"> 
            <img src="images/branding/logo/silverstring-special-logo.png" alt="Official Special Episode of Silverstring webtoon logo - A Project Bethlehem IP created by Eloirien" class="w-48 mx-auto md:mx-0">
            <div class="flex flex-wrap justify-center gap-2">
                <span id="genre-spec-fantasy" class="border border-white/40 rounded-[6px] px-3 py-1 color-white text-[8px] font-bold uppercase tracking-wider">Fantasy</span>
                <span id="genre-slice" class="border border-white/40 rounded-[6px] px-3 py-1 color-white text-[8px] font-bold uppercase tracking-wider">Slice of Life</span>

                <span>Coming Soon</span>
            </p>

       </div>
       
    </main>

      <button id="back-to-top" onclick="teleportToTop(event)" class="fixed right-6 bg-blue-600 hover:bg-blue-500 p-3 rounded-md shadow-[0_0_20px_rgba(59,130,246,0.4)] z-50 transition-colors">
       <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="18 15 12 9 6 15"></polyline></svg>
      </button>

    <script>
        function setLanguage(lang) {
            document.documentElement.lang = lang.toLowerCase();
           
            localStorage.setItem('preferredLang', lang);
            
            // Fetch from Universal Database
            const ui = LUMINUS_DB.ui[lang];
            const page = LUMINUS_DB.pages.index[lang]; 
            
            // Update Navigation
            document.querySelector('.nav-link[href="index.html"]').innerText = ui.home;
            document.querySelector('.nav-link[href="about.html"]').innerText = ui.about;
            document.getElementById('current-lang-label').innerText = lang;
            
            // Update Page Content
            // This now targets the ONLY "page-title" ID
            document.getElementById('page-title').innerText = ui.comics; 
            document.getElementById('status-silverstring').innerText = ui.status;
            document.getElementById('status-specials').innerText = ui.comingSoon;
         
            // Update Main Story Genres
            document.getElementById('genre-fantasy').innerText = page.genres[0];
            document.getElementById('genre-drama').innerText = page.genres[1];
            document.getElementById('genre-action').innerText = page.genres[2];
            
            // Update Specials Genres (New Logic)
            document.getElementById('genre-spec-fantasy').innerText = page.specialGenres[0];
            document.getElementById('genre-slice').innerText = page.specialGenres[1];
        
            window.location.hash = lang;
        }
    
        window.onload = () => {
            const savedLang = localStorage.getItem('preferredLang');
            const hashLang = window.location.hash.replace('#', '');
            const finalLang = hashLang || savedLang || 'EN';
            setLanguage(finalLang);
        };
        
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());

       window.addEventListener('scroll', () => {
       const btn = document.getElementById('back-to-top');
       if (window.scrollY > 400) {
           btn.classList.add('show-btn');
       } else {
           btn.classList.remove('show-btn');
       }
   });
   
      function teleportToTop(e) {
          if(e) e.stopPropagation();
          window.scrollTo({ top: 0, behavior: 'smooth' });
      }
       
    </script>
