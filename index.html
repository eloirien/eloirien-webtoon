<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eloirien | Silverstring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: #E0E0E0; margin: 0; overflow-x: hidden; }
        
        /* Navigation & Lang Dropdown */
        .nav-container { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: center; padding-top: 2rem; padding-left: 15px; padding-right: 15px; pointer-events: none; }
        .nav-pill { pointer-events: auto; background-color: rgba(13, 13, 13, 0.95); backdrop-filter: blur(20px) saturate(180%); padding: 6px 16px; border-radius: 9999px; border: 2px solid rgba(255, 255, 255, 0.25); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); display: flex; align-items: center; gap: 12px; height: 42px; margin: 0 auto; }
        .nav-link { color: #9ca3af; text-transform: uppercase; font-size: 10px; font-weight: 500; letter-spacing: 0.05em; transition: color 0.3s; cursor: pointer; }
        .nav-link:hover { color: #3b82f6; }

        .custom-lang-dropdown { position: relative; display: flex; align-items: center; }
        .lang-trigger { background-color: rgba(31, 41, 55, 0.6); border: 1px solid rgba(59, 130, 246, 0.3); color: #3b82f6; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .lang-menu { position: absolute; top: 100%; right: 0; padding-top: 15px; display: none; flex-direction: column; z-index: 2000; width: 200px; }
        .lang-menu-content { background-color: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .lang-item { padding: 12px; font-size: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #E0E0E0; border-bottom: 1px solid #1f1f1f; }
        .lang-item:hover { background-color: #2d2d2d; color: #3b82f6; }
        .flag-icon { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; }
        .custom-lang-dropdown:hover .lang-menu { display: flex; }

        /* Unified Button Sizing */
        .btn-action-size { width: 110px; padding-top: 0.5rem; padding-bottom: 0.5rem; text-align: center; }
        .btn-read { transition: all 0.3s ease; }
        .btn-read:hover { box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); transform: translateY(-1px); }
        .btn-notify { background-color: #f59e0b; color: #000; transition: all 0.3s ease; }
        .btn-notify:hover { background-color: #fbbf24; box-shadow: 0 0 15px rgba(245, 158, 11, 0.7); transform: translateY(-1px); }

        /* Content Cards */
        .episode-card { background-color: #1a1a1a; border: 1px solid #2d2d2d; transition: all 0.2s; width: 100%; max-width: 42rem; }
        .episode-card:hover { transform: scale(1.01); border-color: #3b82f6; }
        .card-coming-soon:hover { border-color: #f59e0b !important; box-shadow: 0 0 20px rgba(245, 158, 11, 0.15); }

        /* Hero */
        .hero-wrapper { position: relative; background-color: #0d0d0d; overflow: hidden; width: 100%; }
        .hero-blur-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('images/cover.webp'); background-size: cover; filter: blur(10px) brightness(0.3); z-index: 1; }
        .hero-stage-fixed { position: relative; z-index: 2; width: 90%; max-width: 1100px; margin: 8rem auto 2.5rem auto; aspect-ratio: 2 / 1; background-image: url('images/cover.webp'); background-size: cover; border-radius: 16px; }
        .branding-pill { background-color: rgba(13, 13, 13, 0.85); backdrop-filter: blur(12px); width: 90%; max-width: 1200px; margin: -20px auto 40px auto; padding: 24px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; align-items: center; gap: 16px; position: relative; z-index: 10; }
        .genre-tag { border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 8px; padding: 4px 16px; color: white; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        img { -webkit-user-drag: none; user-select: none; }

        /* Lightbox Modal Style */
        #lightbox-overlay {
            display: none;
            position: fixed;
            z-index: 5000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        
        #lightbox-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        
        #lightbox-overlay.active #lightbox-img {
            transform: scale(1);
        }
        
    </style>
</head>
<body>

    <nav class="nav-container">
        <div class="nav-pill">
            <span class="text-white font-bold tracking-[0.2em] text-[10px] uppercase">E L O I R I E N</span>
            <div class="h-4 w-[1px] bg-gray-800"></div>
            <a href="comics.html" class="nav-link nav-link-comics">comics</a>
            <a href="about.html" class="nav-link nav-link-about">about</a>
            <div class="custom-lang-dropdown">
                <div class="lang-trigger">🌐 <span id="current-lang-label">EN</span></div>
                <div class="lang-menu">
                    <div class="lang-menu-content">
                        <div class="lang-item" onclick="setLanguage('EN')"><img src="https://flagcdn.com/us.svg" class="flag-icon"> English</div>
                        <div class="lang-item" onclick="setLanguage('ID')"><img src="https://flagcdn.com/id.svg" class="flag-icon"> Bahasa Indonesia</div>
                        <div class="lang-item" onclick="setLanguage('JP')"><img src="https://flagcdn.com/jp.svg" class="flag-icon"> 日本語</div>
                        <div class="lang-item" onclick="setLanguage('KR')"><img src="https://flagcdn.com/kr.svg" class="flag-icon"> 한국어</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <section class="hero-wrapper">
        <div class="hero-blur-bg"></div>
        <div class="hero-stage-fixed"></div>
        <div class="branding-pill">
            <img src="images/logo.png" alt="Silverstring" class="w-full max-w-[280px] md:max-w-[400px]">
            <div class="flex items-center space-x-3">
                <span class="genre-tag">Fantasy</span>
                <span class="genre-tag">Drama</span>
                <span class="genre-tag">Action</span>
            </div>
            <span class="series-status-tag text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-2">Main Story in Progress</span>
        </div>
    </section>

    <div class="sticky top-0 bg-black/95 backdrop-blur-md border-b border-gray-800 z-40">
        <div class="max-w-screen-xl mx-auto flex justify-center">
            <button onclick="switchTab('info')" id="tab-info" class="tab-button active px-6 py-4 text-xs font-bold tracking-widest border-b-2 border-blue-600 text-white uppercase">Info</button>
            <button onclick="switchTab('episodes')" id="tab-episodes" class="tab-button px-6 py-4 text-xs font-bold tracking-widest border-b-2 border-transparent text-gray-500 hover:text-white uppercase">Episodes</button>
            <button onclick="switchTab('gallery')" id="tab-gallery" class="tab-button px-6 py-4 text-xs font-bold tracking-widest border-b-2 border-transparent text-gray-500 hover:text-white uppercase">Gallery</button>
        </div>
    </div>

    <main class="max-w-screen-xl mx-auto px-6 py-12">
        <section id="content-info" class="tab-content flex flex-col items-center space-y-12">
            <div class="w-64 md:w-80 rounded-lg overflow-hidden border border-gray-800 shadow-2xl">
                <img src="images/vertical-cover.webp" class="w-full h-auto">
            </div>
            <div class="max-w-2xl text-center space-y-8">
                <div id="dynamic-synopsis"></div>
                <div class="bg-gray-900/50 p-6 rounded-2xl border border-gray-800 text-left flex items-center space-x-4">
                    <img src="images/profile.webp" class="w-12 h-12 rounded-full border border-gray-700 object-cover">
                    <div>
                        <p class="font-bold text-white uppercase text-xs tracking-widest">Eloirien</p>
                        <p class="text-[10px] text-blue-400">Illustrator & Comic Artist</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="content-episodes" class="tab-content hidden flex flex-col items-center">
            <div class="w-full max-w-2xl flex items-center justify-between mb-6 px-2">
                <div class="flex gap-2">
                    <button class="text-[10px] font-bold border border-gray-700 px-3 py-1.5 rounded-full hover:bg-white hover:text-black transition-all uppercase tracking-widest">First Episode</button>
                    <button class="text-[10px] font-bold border border-gray-700 px-3 py-1.5 rounded-full hover:bg-white hover:text-black transition-all uppercase tracking-widest">Newest Episode</button>
                </div>
                <button onclick="toggleSort()" class="w-8 h-8 rounded-full bg-gray-900 border border-gray-700 flex items-center justify-center hover:border-blue-500 transition-all">
                    <span id="sort-icon" class="text-gray-400 text-sm transition-transform duration-300">⇅</span>
                </button>
            </div>
            <div id="episode-list" class="w-full flex flex-col items-center space-y-4"></div>
        </section>

            <section id="content-gallery" class="tab-content hidden grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto">
                <div class="relative overflow-hidden border border-gray-800 rounded-xl aspect-square bg-zinc-900 group cursor-zoom-in" 
                     onclick="openLightbox('images/gallery/gallery-eden.webp')">
                    <img src="images/gallery/gallery-eden.webp" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black to-transparent opacity-0 group-hover:opacity-100 transition-all z-20">
                        <p class="text-[10px] font-bold text-white uppercase tracking-widest">Eden</p>
                    </div>
                    <div class="absolute inset-0 z-10 w-full h-full" style="background: rgba(0,0,0,0);"></div>
                </div>
            </section>
    </main>

    <script>
        const siteContent = {
            EN: {
                navComics: "comics", navAbout: "about", status: "Main Story in Progress", tabs: ["INFO", "EPISODES", "GALLERY"],
                genres: ["Fantasy", "Drama", "Action"],
                synopsisHTML: `<p class="text-sm leading-relaxed text-gray-400 text-left mb-4">Both Alicia and Archius have to fight for their identity while fulfilling their duty to protect the kingdom from an emerging power of darkness. How will their intertwined destinies be revealed?</p>
                <em class="text-xs italic border-l-2 border-blue-600 pl-3 block mt-2 text-left text-gray-500">"For we are not fighting against flesh-and-blood enemies, but against evil rulers and authorities of the unseen world..."</em>`,
                episodes: [
                    { title: "Prologue: Storm", date: "Nov 01, 2025", thumb: "images/ep1-thumb.webp", link: "reader.html" },
                    { title: "Prologue: The King", date: "Nov 29, 2025", thumb: "images/ep2-thumb.webp", link: "reader_ep2.html" },
                    { title: "Prologue: The Cup", date: "Jan 04, 2026", thumb: "images/ep3-thumb.webp", link: "reader_ep3.html" },
                    { title: "01 - Who (Part 1)", date: "Feb 07, 2026", thumb: "images/ep4-thumb.webp", link: "reader_ep4.html" },
                    { title: "01 - Who (Part 2)", date: "Mar 08, 2026", thumb: "images/ep5-thumb.webp", link: "reader_ep5.html" },
                    { title: "02 - Friend (Part 1)", date: "Apr 23, 2026", thumb: "images/ep6-thumb.webp", link: "reader_ep6.html" }
                ],
                comingSoon: "Coming soon"
            },
            ID: {
                navComics: "komik", navAbout: "tentang", status: "Cerita Utama Berjalan", tabs: ["INFO", "EPISODE", "GALERI"],
                genres: ["Fantasi", "Drama", "Aksi"],
                synopsisHTML: `<p class="text-sm leading-relaxed text-gray-400 text-left mb-4">Alicia dan Archius harus berjuang demi identitas mereka sambil menjalankan tugas melindungi kerajaan dari kekuatan kegelapan yang muncul. Bagaimana takdir mereka yang saling terkait akan terungkap?</p>
                <em class="text-xs italic border-l-2 border-blue-600 pl-3 block mt-2 text-left text-gray-500">"Karena perjuangan kita bukanlah melawan darah dan daging, melainkan melawan pemerintah-pemerintah, melawan penguasa-penguasa..."</em>`,
                episodes: [
                    { title: "Prolog: Badai", date: "01 Nov 2025", thumb: "images/ep1-thumb.webp", link: "reader.html" },
                    { title: "Prolog: Sang Raja", date: "29 Nov 2025", thumb: "images/ep2-thumb.webp", link: "reader_ep2.html" },
                    { title: "Prolog: Cawan", date: "04 Jan 2026", thumb: "images/ep3-thumb.webp", link: "reader_ep3.html" },
                    { title: "01 - Siapa (Bagian 1)", date: "07 Feb 2026", thumb: "images/ep4-thumb.webp", link: "reader_ep4.html" },
                    { title: "01 - Siapa (Bagian 2)", date: "08 Mar 2026", thumb: "images/ep5-thumb.webp", link: "reader_ep5.html" },
                    { title: "02 - Teman (Bagian 1)", date: "23 Apr 2026", thumb: "images/ep6-thumb.webp", link: "reader_ep6.html" }
                ],
                comingSoon: "Segera hadir"
            },
            JP: {
                navComics: "コミック", navAbout: "概要", status: "連載中", tabs: ["情報", "エピソード", "ギャラリー"],
                genres: ["ファンタジー", "ドラマ", "アクション"],
                synopsisHTML: `<p class="text-sm leading-relaxed text-gray-400 text-left mb-4">アリシアとアルキウスは、忍び寄る闇の勢力から王国を守るという使命を果たしながら、自らのアイデンティティのために戦わなければならない。絡み合う二人の運命は、いかにして明らかになるのか？</p>
                <em class="text-xs italic border-l-2 border-blue-600 pl-3 block mt-2 text-left text-gray-500">「私たちの格闘は血肉に対するものではなく、主権、力、この暗やみの世界の支配者たち、また、天にいる悪の霊に対するものである。」</em>`,
                episodes: [
                    { title: "プロローグ: 嵐", date: "2025年11月01日", thumb: "images/ep1-thumb.webp", link: "reader.html" },
                    { title: "プロローグ: 王", date: "2025年11月29日", thumb: "images/ep2-thumb.webp", link: "reader.html" },
                    { title: "プロローグ: 杯", date: "2026年01月04日", thumb: "images/ep3-thumb.webp", link: "reader.html" },
                    { title: "01 - 誰 (前編)", date: "2026年02月07日", thumb: "images/ep4-thumb.webp", link: "reader.html" },
                    { title: "01 - 誰 (後編)", date: "2026年03月08日", thumb: "images/ep5-thumb.webp", link: "reader.html" },
                    { title: "02 - 友 (前編)", date: "2026年04月23日", thumb: "images/ep6-thumb.webp", link: "reader.html" }
                ],
                comingSoon: "近日公開"
            },
            KR: {
                navComics: "코믹스", navAbout: "정보", status: "연재 중", tabs: ["정보", "에피소드", "갤러리"],
                genres: ["판타지", "드라마", "액션"],
                synopsisHTML: `<p class="text-sm leading-relaxed text-gray-400 text-left mb-4">알리시아와 아르키우스는 어둠의 세력으로부터 왕국을 지키는 의무를 다하는 동시에, 자신의 정체성을 찾기 위해 싸워야 한다. 뒤얽힌 두 사람의 운명은 어떻게 밝혀질 것인가?</p>
                <em class="text-xs italic border-l-2 border-blue-600 pl-3 block mt-2 text-left text-gray-500">"우리의 씨름은 혈과 육을 상대하는 것이 아니요 통치자들과 권세들과 이 어둠의 세상 주관자들과 하늘에 있는 악의 영들을 상대함이라."</em>`,
                episodes: [
                    { title: "프롤로그: 폭풍", date: "2025년 11월 01일", thumb: "images/ep1-thumb.webp", link: "reader.html" },
                    { title: "프롤로그: 왕", date: "2025년 11월 29일", thumb: "images/ep2-thumb.webp", link: "reader.html" },
                    { title: "프롤로그: 잔", date: "2026년 01월 04일", thumb: "images/ep3-thumb.webp", link: "reader.html" },
                    { title: "01 - 누구 (1부)", date: "2026년 02월 07일", thumb: "images/ep4-thumb.webp", link: "reader.html" },
                    { title: "01 - 누구 (2부)", date: "2026년 03월 08일", thumb: "images/ep5-thumb.webp", link: "reader.html" },
                    { title: "02 - 친구 (1부)", date: "2026년 04월 23일", thumb: "images/ep6-thumb.webp", link: "reader.html" }
                ],
                comingSoon: "곧 공개"
            }
        };

        let isReversed = false;

        function setLanguage(lang) {
            const dict = siteContent[lang] || siteContent.EN;
            document.querySelector('.nav-link-comics').innerText = dict.navComics;
            document.querySelector('.nav-link-about').innerText = dict.navAbout;
            document.querySelector('.series-status-tag').innerText = dict.status;
            document.getElementById('current-lang-label').innerText = lang;
            document.getElementById('dynamic-synopsis').innerHTML = dict.synopsisHTML;
            
            const tabBtns = document.querySelectorAll('.tab-button');
            tabBtns.forEach((btn, i) => btn.innerText = dict.tabs[i]);

            const genreTags = document.querySelectorAll('.genre-tag');
            genreTags.forEach((tag, i) => { if (dict.genres[i]) tag.innerText = dict.genres[i]; });

            const container = document.getElementById('episode-list');
            container.innerHTML = '';
            const list = isReversed ? [...dict.episodes].reverse() : dict.episodes;

            list.forEach(ep => {
                container.innerHTML += `<div class="episode-card flex items-center p-4 rounded-xl">
                    <img src="${ep.thumb}" class="w-24 h-14 md:w-32 md:h-20 object-cover rounded-lg">
                    <div class="ml-4 flex-grow"><h4 class="text-sm font-bold text-white uppercase">${ep.title}</h4><p class="text-[10px] text-gray-500 uppercase">${ep.date}</p></div>
                    <a href="${ep.link}" class="btn-read btn-action-size bg-blue-600 text-white text-[10px] rounded font-bold uppercase tracking-wider flex items-center justify-center">Read</a>
                </div>`;
            });
            container.innerHTML += `<div class="episode-card card-coming-soon flex items-center p-4 rounded-xl opacity-80 cursor-default">
                <div class="w-24 h-14 md:w-32 md:h-20 bg-zinc-800 rounded-lg flex items-center justify-center border border-zinc-700"><span class="text-[10px] font-bold text-zinc-500 tracking-widest">EP 07</span></div>
                <div class="ml-4 flex-grow"><h4 class="text-sm font-bold text-zinc-400 uppercase">02 - Friend (Part 2)</h4><p class="text-[10px] text-amber-500 font-bold uppercase tracking-widest">${dict.comingSoon}</p></div>
                <button class="btn-notify btn-action-size text-[10px] rounded font-black uppercase flex items-center justify-center">Notify</button>
            </div>`;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('content-' + tabName).classList.remove('hidden');
            document.querySelectorAll('.tab-button').forEach(b => {
                b.classList.remove('border-blue-600', 'text-white');
                b.classList.add('border-transparent', 'text-gray-500');
            });
            document.getElementById('tab-' + tabName).classList.add('border-blue-600', 'text-white');
        }

        function toggleSort() {
            isReversed = !isReversed;
            const icon = document.getElementById('sort-icon');
            icon.style.transform = isReversed ? 'rotate(180deg)' : 'rotate(0deg)';
            setLanguage(document.getElementById('current-lang-label').innerText);
        }

        window.onload = () => setLanguage('EN');
        document.addEventListener('contextmenu', e => e.preventDefault());

        function openLightbox(src) {
            const overlay = document.getElementById('lightbox-overlay');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        }
        
        function closeLightbox() {
            const overlay = document.getElementById('lightbox-overlay');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 300);
        }
        
    </script>

    <div id="lightbox-overlay" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Full Size View">
    </div>
    
</body>
</html>
