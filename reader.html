<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverstring | Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #d1d5db;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Full immersion: UI is hidden by default */
        .immersive-ui {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        
        .ui-hidden {
            transform: translateY(-100%); /* Top bar slides up */
            opacity: 0;
            pointer-events: none;
        }

        .ui-hidden-bottom {
            transform: translateY(100%); /* Bottom bar slides down */
            opacity: 0;
            pointer-events: none;
        }

        /* Webtoon scroll experience */
        .panel-container {
            position: relative;
            width: 100%;
        }

        .panel-container img {
            display: block;
            width: 100%;
            height: auto;
            -webkit-user-drag: none;
            user-select: none;
        }

        /* Art Protection: Ghost Layer */
        .ghost-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: transparent;
        }

        /* Back to Top Button */
        #back-to-top {
            transition: all 0.3s ease;
            bottom: 100px; /* Sits above the bottom nav */
        }
    </style>
</head>
<body onclick="toggleUI()">

    <nav id="top-nav" class="immersive-ui fixed top-0 left-0 w-full bg-black/90 backdrop-blur-md border-b border-gray-800 p-4 flex justify-between items-center z-50">
        <a href="index.html" class="text-blue-400 font-bold hover:text-blue-300 flex items-center text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mr-2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            EXIT
        </a>
        <div class="text-center">
            <h1 class="text-xs uppercase tracking-tighter text-gray-500 font-bold">Silverstring</h1>
            <p class="text-[10px] text-white uppercase tracking-widest">Prologue: Storm</p>
        </div>
        <div class="w-10"></div> </nav>

    <main class="max-w-2xl mx-auto pt-0">
        <div class="panel-container">
            <img src="images/panel_01.webp" alt="Panel 1">
            <div class="ghost-layer"></div>
        </div>
        <div class="panel-container">
            <img src="images/panel_02.webp" alt="Panel 2">
            <div class="ghost-layer"></div>
        </div>
        </main>

    <button id="back-to-top" onclick="scrollToTop(event)" class="fixed right-6 opacity-0 translate-y-10 bg-blue-600/80 backdrop-blur-md p-3 rounded-full border border-blue-400 z-40">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>

    <nav id="bottom-nav" class="immersive-ui fixed bottom-0 left-0 w-full bg-black/90 backdrop-blur-md border-t border-gray-800 p-4 z-50">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <button class="px-4 py-2 bg-gray-800 rounded-md text-xs font-bold text-gray-400 cursor-not-allowed">PREV</button>
            
            <div class="flex flex-col items-center">
                <span class="text-[10px] text-gray-500 uppercase font-bold">Chapter</span>
                <span class="text-sm font-bold text-white">01</span>
            </div>

            <button class="px-4 py-2 bg-blue-600 rounded-md text-xs font-bold text-white hover:bg-blue-500">NEXT</button>
        </div>
    </nav>

    <script>
        let uiVisible = true;
        const topNav = document.getElementById('top-nav');
        const bottomNav = document.getElementById('bottom-nav');
        const backToTopBtn = document.getElementById('back-to-top');

        // Toggle UI visibility
        function toggleUI() {
            uiVisible = !uiVisible;
            if (uiVisible) {
                topNav.classList.remove('ui-hidden');
                bottomNav.classList.remove('ui-hidden-bottom');
            } else {
                topNav.classList.add('ui-hidden');
                bottomNav.classList.add('ui-hidden-bottom');
            }
        }

        // Back to top logic
        window.onscroll = function() {
            if (document.body.scrollTop > 500 || document.documentElement.scrollTop > 500) {
                backToTopBtn.classList.remove('opacity-0', 'translate-y-10');
            } else {
                backToTopBtn.classList.add('opacity-0', 'translate-y-10');
            }
        };

        function scrollToTop(e) {
            e.stopPropagation(); // Prevents triggering the UI toggle
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Global protection
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
