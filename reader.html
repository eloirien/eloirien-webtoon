<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverstring Reader | Eloirien</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ccc; margin: 0; }
        .comic-container { max-width: 800px; margin: 0 auto; }
        .panel { width: 100%; display: block; }
        
        /* Floating Nav Bar */
        .reader-nav {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; gap: 20px; align-items: center;
        }
        .nav-btn { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #9ca3af; }
        .nav-btn:hover { color: #3b82f6; }
    </style>
</head>
<body>

    <div id="comic-main" class="comic-container">
        </div>

    <nav class="reader-nav">
        <a href="index.html" id="nav-home" class="nav-btn">Home</a>
        <div class="h-4 w-[1px] bg-gray-800"></div>
        <button onclick="changeLanguage('EN')" class="nav-btn">EN</button>
        <button onclick="changeLanguage('ID')" class="nav-btn">ID</button>
        <button onclick="changeLanguage('JP')" class="nav-btn">JP</button>
        <button onclick="changeLanguage('KR')" class="nav-btn">KR</button>
    </nav>

    <script>
        const readerContent = {
            EN: { home: "Home", panels: 22, folder: "en" },
            ID: { home: "Beranda", panels: 22, folder: "id" },
            // Placeholder logic for languages still in progress
            JP: { home: "ホーム", panels: 1, folder: "placeholders", alt: "Translation in progress - Chibi Alice" },
            KR: { home: "홈", panels: 1, folder: "placeholders", alt: "번역 진행 중 - Chibi Alice" }
        };

        function changeLanguage(lang) {
            const data = readerContent[lang];
            const container = document.getElementById('comic-main');
            document.getElementById('nav-home').innerText = data.home;
            
            container.innerHTML = ''; // Clear current panels

            if (data.folder === "placeholders") {
                // Show Chibi Alice if translation isn't ready
                container.innerHTML = `<img src="images/chibi-alice-placeholder.webp" alt="${data.alt}" class="panel">`;
            } else {
                // Load the full 22 panels
                for (let i = 1; i <= data.panels; i++) {
                    container.innerHTML += `<img src="images/ep1/${data.folder}/panel_${i}.webp" class="panel" loading="lazy">`;
                }
            }
            
            // Update URL hash without reloading page
            window.location.hash = lang;
        }

        // Initialize based on URL or default to EN
        window.onload = () => {
            const hash = window.location.hash.replace('#', '') || 'EN';
            changeLanguage(hash);
        };
    </script>
</body>
</html>
