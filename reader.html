<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverstring | Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #0a0a0a; color: #d1d5db; font-family: 'Inter', sans-serif; user-select: none; }
        #global-click-zone { min-height: 100vh; width: 100%; cursor: pointer; position: relative; z-index: 10; }
        .immersive-ui { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; opacity: 0; pointer-events: none; z-index: 50; }
        .top-ui { transform: translateY(-100%); }
        .bottom-ui { transform: translateY(100%); }
        .ui-active { transform: translateY(0) !important; opacity: 1 !important; pointer-events: auto !important; }
        #episode-drawer { transform: translateY(100%); transition: transform 0.4s ease; z-index: 60; }
        #episode-drawer.open { transform: translateY(0); }
        .webtoon-container { width: 100%; max-width: 800px; margin: 0 auto; line-height: 0; }
        .panel-container { position: relative; width: 100%; }
        .ghost-layer { position: absolute; inset: 0; z-index: 5; background: transparent; }
        img { width: 100%; display: block; -webkit-user-drag: none; background-color: #0a0a0a; }
        #back-to-top { transition: all 0.3s ease; bottom: 100px; opacity: 0; pointer-events: none; transform: translateY(20px); }
        #back-to-top.show-btn { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .lang-btn-active { color: #3b82f6 !important; border-bottom: 2px solid #3b82f6; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="global-click-zone" onclick="toggleUI()">

        <nav id="top-nav" class="immersive-ui top-ui fixed top-0 left-0 w-full bg-black/95 backdrop-blur-md border-b border-gray-800 p-4 flex justify-between items-center">
            <a href="index.html" class="text-blue-400 font-bold text-xs tracking-widest" onclick="event.stopPropagation();">EXIT</a>
            
            <div class="text-center flex flex-col items-center">
                <p id="display-ep-title" class="text-[10px] text-white uppercase tracking-[0.2em]">Prologue: Storm</p>
                <div class="flex gap-3 mt-1">
                    <button onclick="changeLanguage('EN', event)" id="lang-EN" class="text-[8px] font-bold text-gray-500 uppercase tracking-tighter">EN</button>
                    <button onclick="changeLanguage('ID', event)" id="lang-ID" class="text-[8px] font-bold text-gray-500 uppercase tracking-tighter">ID</button>
                    <button onclick="changeLanguage('JP', event)" id="lang-JP" class="text-[8px] font-bold text-gray-500 uppercase tracking-tighter">JP</button>
                    <button onclick="changeLanguage('KR', event)" id="lang-KR" class="text-[8px] font-bold text-gray-500 uppercase tracking-tighter">KR</button>
                </div>
            </div>

            <button onclick="toggleDrawer(event)" class="text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </nav>

        <main id="reader-main" class="webtoon-container"></main>

        <nav id="bottom-nav" class="immersive-ui bottom-ui fixed bottom-0 left-0 w-full bg-black/95 backdrop-blur-md border-t border-gray-800 p-4">
            <div class="max-w-md mx-auto flex items-center justify-between">
                <button id="label-prev" class="text-[10px] font-bold text-gray-600 uppercase" onclick="event.stopPropagation();">Prev</button>
                <div class="text-center cursor-pointer" onclick="toggleDrawer(event)">
                    <span id="label-ep-small" class="text-[9px] text-gray-500 uppercase font-bold block tracking-tighter">Episode</span>
                    <span class="text-xs font-bold text-white tracking-widest">#1</span>
                </div>
                <button id="label-next" class="px-6 py-2 bg-blue-600 rounded-md text-[10px] font-bold text-white uppercase" onclick="event.stopPropagation();">Next</button>
            </div>
        </nav>
    </div>

    <div id="episode-drawer" class="fixed bottom-0 left-0 w-full bg-zinc-900 border-t border-zinc-800 p-6 max-h-[50vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 id="label-drawer-title" class="text-white text-xs font-bold uppercase tracking-widest">Episode List</h3>
            <button onclick="toggleDrawer(event)" id="label-drawer-close" class="text-gray-500 text-xs uppercase">CLOSE</button>
        </div>
        <div class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide">
            <div class="flex-shrink-0 w-32 group cursor-pointer opacity-100">
                <img src="images/ep1-thumb.webp" class="rounded border-2 border-blue-500 shadow-lg">
                <p id="label-ep1-name" class="text-[9px] mt-2 text-gray-400 uppercase font-bold">Prologue: Storm</p>
            </div>
        </div>
    </div>

    <button id="back-to-top" onclick="teleportToTop(event)" class="fixed right-6 bg-white p-3 rounded-full shadow-2xl z-40">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>

    <script>
        const readerData = {
            EN: { epName: "Prologue: Storm", prev: "Prev", next: "Next", epLabel: "Episode", listTitle: "Episode List", close: "Close", panels: 22, path: "images/episodes/ep1/ep1_", suffix: "_EN.webp", placeholder: false },
            ID: { epName: "Prolog: Badai", prev: "Sebm", next: "Lanjut", epLabel: "Episode", listTitle: "Daftar Episode", close: "Tutup", panels: 22, path: "images/episodes/ep1/ep1_", suffix: "_ID.webp", placeholder: false },
            JP: { epName: "プロローグ: 嵐", prev: "前へ", next: "次へ", epLabel: "エピソード", listTitle: "エピソード一覧", close: "閉じる", panels: 1, path: "images/placeholders/chibi_alice.webp", suffix: "", placeholder: true },
            KR: { epName: "프롤로그: 폭풍", prev: "이전", next: "다음", epLabel: "에피소드", listTitle: "에피소드 목록", close: "닫기", panels: 1, path: "images/placeholders/chibi_alice.webp", suffix: "", placeholder: true }
        };

        const readerMain = document.getElementById('reader-main');

        function changeLanguage(lang, e) {
            if(e) e.stopPropagation();
            const data = readerData[lang];
            
            // Update UI Labels
            document.getElementById('display-ep-title').innerText = data.epName;
            document.getElementById('label-ep1-name').innerText = data.epName;
            document.getElementById('label-prev').innerText = data.prev;
            document.getElementById('label-next').innerText = data.next;
            document.getElementById('label-ep-small').innerText = data.epLabel;
            document.getElementById('label-drawer-title').innerText = data.listTitle;
            document.getElementById('label-drawer-close').innerText = data.close;

            // Lang Button UI highlight
            document.querySelectorAll('[id^="lang-"]').forEach(btn => btn.classList.remove('lang-btn-active'));
            document.getElementById('lang-' + lang).classList.add('lang-btn-active');

            // Load Panels
            readerMain.innerHTML = '';
            if (data.placeholder) {
                // Emergency Chibi Alice Placeholder
                readerMain.innerHTML = `<div class="panel-container"><img src="${data.path}" alt="Placeholder"><div class="ghost-layer"></div></div>`;
            } else {
                for (let i = 1; i <= data.panels; i++) {
                    const pageNum = i.toString().padStart(2, '0'); 
                    readerMain.innerHTML += `
                        <div class="panel-container">
                            <img src="${data.path}${pageNum}${data.suffix}" alt="Page ${pageNum}" loading="lazy">
                            <div class="ghost-layer"></div>
                        </div>`;
                }
            }
            window.location.hash = lang;
        }

        let uiVisible = false;
        const btn = document.getElementById('back-to-top');

        function toggleUI() {
            uiVisible = !uiVisible;
            document.getElementById('top-nav').classList.toggle('ui-active', uiVisible);
            document.getElementById('bottom-nav').classList.toggle('ui-active', uiVisible);
            updateTeleportVisibility();
        }

        function updateTeleportVisibility() {
            if (uiVisible && window.scrollY > 800) { btn.classList.add('show-btn'); } 
            else { btn.classList.remove('show-btn'); }
        }

        function toggleDrawer(e) {
            e.stopPropagation();
            document.getElementById('episode-drawer').classList.toggle('open');
        }

        window.onscroll = function() { updateTeleportVisibility(); };

        function teleportToTop(e) {
            e.stopPropagation(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            const initialLang = window.location.hash.replace('#', '') || 'EN';
            changeLanguage(initialLang);
        };

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
