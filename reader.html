<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverstring Reader | Eloirien</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #E0E0E0; margin: 0; overflow-x: hidden; }
        
        /* Comic Display */
        .comic-container { max-width: 800px; margin: 0 auto; background-color: #000; position: relative; }
        .comic-panel { width: 100%; display: block; height: auto; }

        /* Floating Nav Pill */
        .reader-nav-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; width: 100%; display: flex; justify-content: center; }
        .reader-nav-pill { pointer-events: auto; background-color: rgba(13, 13, 13, 0.9); backdrop-filter: blur(15px); padding: 8px 20px; border-radius: 9999px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 15px; }
        
        .nav-btn { color: #9ca3af; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.3s; }
        .nav-btn:hover { color: #3b82f6; }
        .lang-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }

        /* Teleport to Top Button */
        #teleport-btn { position: fixed; bottom: 100px; right: 20px; width: 40px; height: 40px; background: rgba(59, 130, 246, 0.8); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 900; cursor: pointer; transition: all 0.3s; }
        #teleport-btn:hover { transform: translateY(-5px); background: #3b82f6; }

        /* Hamburger Episode Menu */
        #ep-menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; backdrop-filter: blur(10px); }
        .ep-menu-content { max-width: 500px; margin: 50px auto; padding: 20px; }

        /* Protection Sentry */
        img { -webkit-user-drag: none; user-select: none; }
    </style>
</head>
<body>

    <div class="fixed top-0 w-full bg-black/80 backdrop-blur-md p-4 border-b border-gray-800 z-50 flex justify-between items-center">
        <div class="flex flex-col">
            <h1 id="display-ep-title" class="text-xs md:text-sm font-bold text-white uppercase tracking-widest">Prologue: Storm</h1>
            <p id="display-series-title" class="text-[10px] text-blue-400 font-medium">Silverstring</p>
        </div>
        <button onclick="toggleEpMenu()" class="text-white hover:text-blue-400 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </div>

    <main class="comic-container pt-20">
        <div id="panel-container">
            </div>
    </main>

    <div id="teleport-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</div>

    <nav class="reader-nav-container">
        <div class="reader-nav-pill">
            <a href="index.html" class="nav-btn">Home</a>
            <div class="h-4 w-[1px] bg-gray-800"></div>
            <button onclick="loadChapter('EN')" id="btn-EN" class="nav-btn">EN</button>
            <button onclick="loadChapter('ID')" id="btn-ID" class="nav-btn">ID</button>
            <button onclick="loadChapter('JP')" id="btn-JP" class="nav-btn">JP</button>
            <button onclick="loadChapter('KR')" id="btn-KR" class="nav-btn">KR</button>
        </div>
    </nav>

    <div id="ep-menu-overlay" onclick="toggleEpMenu()">
        <div class="ep-menu-content space-y-4" onclick="event.stopPropagation()">
            <h2 class="text-white font-bold tracking-widest border-b border-gray-800 pb-4 mb-4">ARCHIVES</h2>
            <a href="reader.html" class="block p-4 bg-zinc-900 rounded-lg border border-blue-600/30 text-sm text-blue-400">Prologue: Storm</a>
            <p class="text-xs text-gray-600 italic">More records being digitized...</p>
        </div>
    </div>

    <script>
        const readerData = {
            EN: { title: "Prologue: Storm", panels: 22, path: "images/ep1/en/", placeholder: false },
            ID: { title: "Prolog: Badai", panels: 22, path: "images/ep1/id/", placeholder: false },
            JP: { title: "プロローグ: 嵐", panels: 1, path: "images/placeholders/", placeholder: true },
            KR: { title: "프롤로그: 폭풍", panels: 1, path: "images/placeholders/", placeholder: true }
        };

        function loadChapter(lang) {
            const data = readerData[lang];
            const container = document.getElementById('panel-container');
            
            // Update Headers
            document.getElementById('display-ep-title').innerText = data.title;
            
            // UI Active State
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('lang-active'));
            document.getElementById('btn-' + lang).classList.add('lang-active');

            container.innerHTML = ''; 

            if (data.placeholder) {
                // RESTORED: Emergency Chibi Alice
                container.innerHTML = `<img src="${data.path}chibi_alice.webp" class="comic-panel">`;
            } else {
                // Load 22 panels
                for (let i = 1; i <= data.panels; i++) {
                    const img = document.createElement('img');
                    img.src = `${data.path}panel_${i}.webp`;
                    img.className = 'comic-panel';
                    img.loading = 'lazy';
                    container.appendChild(img);
                }
            }
            window.location.hash = lang;
        }

        function toggleEpMenu() {
            const menu = document.getElementById('ep-menu-overlay');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        // Teleport Logic
        window.onscroll = function() {
            const btn = document.getElementById('teleport-btn');
            if (document.body.scrollTop > 500 || document.documentElement.scrollTop > 500) {
                btn.style.display = 'flex';
            } else {
                btn.style.display = 'none';
            }
        };

        window.onload = () => {
            const initialLang = window.location.hash.replace('#', '') || 'EN';
            loadChapter(initialLang);
        };

        // Art Protection
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
