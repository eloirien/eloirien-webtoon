<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverstring | Reader</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="content.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #0a0a0a; color: #d1d5db; font-family: 'Inter', sans-serif; user-select: none; }
        #global-click-zone { min-height: 100vh; width: 100%; cursor: pointer; position: relative; z-index: 10; }
        
        /* Immersive UI Logic */
        .immersive-ui { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; opacity: 0; pointer-events: none; z-index: 50; }
        .top-ui { transform: translateY(-100%); }
        .bottom-ui { transform: translateY(100%); }
        .ui-active { transform: translateY(0) !important; opacity: 1 !important; pointer-events: auto !important; }
        
        /* Unified Dropdown */
        .custom-lang-dropdown { position: relative; display: inline-block; }
        .lang-trigger { background-color: rgba(31, 41, 55, 0.6); border: 1px solid rgba(59, 130, 246, 0.3); color: #3b82f6; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .lang-menu { position: absolute; top: 100%; right: 0; padding-top: 10px; display: none; flex-direction: column; z-index: 100; width: 180px; }
        .lang-menu-content { background-color: #1a1a1a; border: 1px solid #333; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        .lang-item { padding: 10px 12px; font-size: 11px; display: flex; align-items: center; gap: 10px; color: #E0E0E0; border-bottom: 1px solid #1f1f1f; transition: background 0.2s; }
        .lang-item:hover { background-color: #2d2d2d; color: #3b82f6; }
        .flag-icon { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; }
        .custom-lang-dropdown:hover .lang-menu { display: flex; }

        #episode-drawer { transform: translateY(100%); transition: transform 0.4s ease; z-index: 60; }
        #episode-drawer.open { transform: translateY(0); }
        .webtoon-container { width: 100%; max-width: 800px; margin: 0 auto; line-height: 0; }
        .panel-container { position: relative; width: 100%; }
        .ghost-layer { position: absolute; inset: 0; z-index: 5; background: transparent; }
        img { width: 100%; display: block; -webkit-user-drag: none; background-color: #0a0a0a; }

        #back-to-top { transition: all 0.3s ease; bottom: 100px; opacity: 0; pointer-events: none; transform: translateY(20px); }
        #back-to-top.show-btn { opacity: 1; pointer-events: auto; transform: translateY(0); }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="global-click-zone" onclick="toggleUI()">

        <nav id="top-nav" class="immersive-ui top-ui fixed top-0 left-0 w-full bg-black/95 backdrop-blur-md border-b border-gray-800 p-4 flex justify-between items-center">
        <a href="index.html" class="text-blue-400 font-bold text-[10px] tracking-widest" onclick="event.stopPropagation();">EXIT</a>
        
        <div class="custom-lang-dropdown" onclick="event.stopPropagation();">
            <div class="lang-trigger flex items-center gap-2">
                <span id="display-ep-title" class="text-white text-[10px] font-black uppercase tracking-[0.2em]">LOADING...</span>
                <svg class="w-2 h-2 text-gray-500 fill-current" viewBox="0 0 24 24"><path d="M12 21l-12-18h24z"/></svg>
            </div>
            <div class="lang-menu">
                <div id="ep-menu-content" class="lang-menu-content max-h-[60vh] overflow-y-auto">
                    </div>
            </div>
        </div>
    
        <div class="custom-lang-dropdown" onclick="event.stopPropagation();">
            <div class="lang-trigger flex items-center gap-1.5">
                <svg class="w-3 h-3 text-blue-400 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z"/>
                </svg>
                <span id="current-lang-label" class="text-[10px] font-bold text-blue-400">EN</span>
            </div>
            <div class="lang-menu">
                <div class="lang-menu-content">
                    <div class="lang-item" onclick="changeLanguage('EN')"><img src="https://flagcdn.com/us.svg" class="flag-icon"> English</div>
                    <div class="lang-item" onclick="changeLanguage('ID')"><img src="https://flagcdn.com/id.svg" class="flag-icon"> Bahasa Indonesia</div>
                    <div class="lang-item" onclick="changeLanguage('JP')"><img src="https://flagcdn.com/jp.svg" class="flag-icon"> 日本語</div>
                    <div class="lang-item" onclick="changeLanguage('KR')"><img src="https://flagcdn.com/kr.svg" class="flag-icon"> 한국어</div>
                </div>
            </div>
        </div>
    </nav>

        <main id="reader-main" class="webtoon-container"></main>

        <nav id="bottom-nav" class="immersive-ui bottom-ui fixed bottom-0 left-0 w-full bg-black/95 backdrop-blur-md border-t border-gray-800 p-4">
            <div class="max-w-md mx-auto flex items-center justify-between">
                <button id="label-prev" class="text-[10px] font-bold text-gray-600 uppercase" onclick="event.stopPropagation();">Prev</button>
                <div class="text-center cursor-pointer" onclick="toggleDrawer(event)">
                    <span id="label-ep-small" class="text-[9px] text-gray-500 uppercase font-bold block tracking-tighter">Episode</span>
                    <span class="text-xs font-bold text-white tracking-widest">#1</span>
                </div>
                <button id="label-next" class="px-6 py-2 bg-blue-600 rounded-md text-[10px] font-bold text-white uppercase" onclick="event.stopPropagation();">Next</button>
            </div>
        </nav>
    </div>

    <div id="episode-drawer" class="fixed bottom-0 left-0 w-full bg-zinc-900 border-t border-zinc-800 p-6 max-h-[60vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 id="label-drawer-title" class="text-white text-xs font-bold uppercase tracking-widest">Episode List</h3>
            <button onclick="toggleDrawer(event)" id="label-drawer-close" class="text-gray-500 text-xs font-bold">CLOSE</button>
        </div>
        <div id="drawer-list" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide">
            </div>
    </div>

    <button id="back-to-top" onclick="teleportToTop(event)" class="fixed right-6 bg-white p-3 rounded-full shadow-2xl z-40">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>

    <script>
    let currentEp = 1;
    let currentLang = 'EN';
    let uiVisible = false;

    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('preferredLang', lang);
        window.location.hash = lang;
        
        const ui = LUMINUS_DB.ui[lang];
        
        // Update Reader UI 
        document.getElementById('nav-home-text').innerText = ui.home;
        document.getElementById('nav-episodes-text').innerText = ui.episodes;
        
        // Update Current Episode Title in Header
        const epData = LUMINUS_DB.library[currentEp];
        if (epData) {
            document.getElementById('ep-title').innerText = epData.name[lang];
        }
        
        renderDrawer(lang);
    }

    function renderDrawer(lang) {
        const drawerList = document.getElementById('drawer-episode-list');
        drawerList.innerHTML = '';
        
        // Sort descending
        const keys = Object.keys(LUMINUS_DB.library).sort((a, b) => parseInt(b) - parseInt(a));
        
        keys.forEach(key => {
            const ep = LUMINUS_DB.library[key];
            const isUpcoming = ep.status === 'upcoming';
            const isActive = parseInt(key) === currentEp;
            const title = ep.name[lang];
            
            if (isUpcoming) {
                drawerList.innerHTML += `
                    <div class="ep-row upcoming-row opacity-40 cursor-not-allowed border-b border-zinc-800 pb-3 mb-3">
                        <div class="text-[10px] text-zinc-500 font-bold mb-1 tracking-widest">${ep.dateLabel}</div>
                        <div class="text-sm text-zinc-400 font-bold tracking-wider uppercase">${title}</div>
                    </div>`;
            } else {
                drawerList.innerHTML += `
                    <div class="ep-row cursor-pointer group border-b border-zinc-800 pb-3 mb-3 transition-colors ${isActive ? 'bg-zinc-900/50 -mx-4 px-4 rounded' : ''}" onclick="changeEpisode(${key})">
                        <div class="text-[10px] font-bold mb-1 tracking-widest ${isActive ? 'text-blue-400' : 'text-gray-500 group-hover:text-blue-400'}">${ep.date[lang]}</div>
                        <div class="text-sm font-bold tracking-wider uppercase ${isActive ? 'text-white' : 'text-gray-300 group-hover:text-white'}">${title}</div>
                    </div>`;
            }
        });
    }

    function loadPages() {
        const container = document.getElementById('comic-container');
        container.innerHTML = '';
        
        const epData = LUMINUS_DB.library[currentEp];
        if (epData && epData.status === 'released') {
            const totalPanels = epData.panels;
            
            for (let i = 1; i <= totalPanels; i++) {
                // Ensure double-digit formatting for image files (e.g., 01.webp, 02.webp)
                const pageNum = i.toString().padStart(2, '0');
                const imgPath = `images/ep${currentEp}/${pageNum}.webp`;
                
                container.innerHTML += `
                    <div class="comic-page" onclick="toggleUI()">
                        <img src="${imgPath}" alt="Page ${pageNum}" loading="lazy" onerror="this.src='images/placeholders/chibi_alice.webp'; this.classList.add('w-48','mx-auto','py-20','opacity-50');">
                        <div class="ghost-layer"></div>
                    </div>`;
            }
        }
    }

    function changeEpisode(newEp) {
        window.location.href = `reader.html?ep=${newEp}#${currentLang}`;
    }

    function toggleUI() {
        uiVisible = !uiVisible;
        document.getElementById('top-nav').classList.toggle('ui-active', uiVisible);
        document.getElementById('bottom-nav').classList.toggle('ui-active', uiVisible);
        const btn = document.getElementById('back-to-top');
        if (uiVisible && window.scrollY > 800) btn.classList.add('show-btn');
        else btn.classList.remove('show-btn');
    }

    function toggleDrawer(e) {
        if(e) e.stopPropagation();
        document.getElementById('episode-drawer').classList.toggle('open');
    }

    function teleportToTop(e) {
        e.stopPropagation(); 
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function initReader() {
        // Parse the episode from URL
        const epParam = getQueryParam('ep');
        currentEp = epParam ? parseInt(epParam) : 1;
        
        // Ensure episode exists in database, fallback to 1
        if (!LUMINUS_DB.library[currentEp]) {
            currentEp = 1;
        }

        // Parse Language
        const savedLang = localStorage.getItem('preferredLang');
        const hashLang = window.location.hash.replace('#', '');
        const finalLang = hashLang || savedLang || 'EN';
        
        setLanguage(finalLang);
        loadPages();
    }

    window.onload = initReader;
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
</script>
    
</body>
    
</html>
