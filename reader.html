<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverstring | Reader</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="content.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #0a0a0a; color: #d1d5db; font-family: 'Inter', sans-serif; user-select: none; }
        #global-click-zone { min-height: 100vh; width: 100%; cursor: pointer; position: relative; z-index: 10; }
        
        .immersive-ui { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; opacity: 0; pointer-events: none; z-index: 50; }
        .top-ui { transform: translateY(-100%); }
        .bottom-ui { transform: translateY(100%); }
        .ui-active { transform: translateY(0) !important; opacity: 1 !important; pointer-events: auto !important; }
        
        .custom-lang-dropdown, .custom-ep-dropdown { position: relative; display: inline-block; }
        .lang-trigger, .ep-trigger { background-color: rgba(31, 41, 55, 0.6); border: 1px solid rgba(59, 130, 246, 0.3); color: #3b82f6; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .ep-trigger { background-color: transparent; border: none; color: white; padding: 6px 12px; }
        
        .lang-menu, .ep-menu { position: absolute; top: 100%; padding-top: 10px; display: none; flex-direction: column; z-index: 100; }
        .lang-menu { right: 0; width: 180px; }
        .ep-menu { left: 50%; transform: translateX(-50%); width: 220px; max-height: 50vh; overflow-y: auto; }
        
        .lang-menu-content, .ep-menu-content { background-color: #1a1a1a; border: 1px solid #333; border-radius: 6px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        .lang-item, .ep-item { padding: 10px 12px; font-size: 11px; display: flex; align-items: center; gap: 10px; color: #E0E0E0; border-bottom: 1px solid #1f1f1f; transition: background 0.2s; cursor: pointer; }
        .ep-item { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; }
        .lang-item:hover, .ep-item:hover { background-color: #2d2d2d; color: #3b82f6; }
        .ep-item.active-ep { background-color: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        
        .custom-lang-dropdown:hover .lang-menu, .custom-ep-dropdown:hover .ep-menu { display: flex; }
        .flag-icon { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; }

        #episode-drawer { transform: translateY(100%); transition: transform 0.4s ease; z-index: 60; }
        #episode-drawer.open { transform: translateY(0); }
        .drawer-scroll { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; scrollbar-width: none; }
        .drawer-scroll::-webkit-scrollbar { display: none; }

        .webtoon-container { width: 100%; max-width: 800px; margin: 0 auto; line-height: 0; padding-bottom: 6rem; position: relative; z-index: 20; }
        img { width: 100%; display: block; -webkit-user-drag: none; background-color: #0a0a0a; }

        .btn-square { border-radius: 6px; transition: all 0.3s ease; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="global-click-zone" onclick="toggleUI()">

        <nav id="top-nav" class="immersive-ui top-ui fixed top-0 left-0 w-full bg-black/95 backdrop-blur-md border-b border-gray-800 p-4 flex justify-between items-center">
            <a href="index.html" id="nav-home-text" class="text-blue-400 font-bold text-[10px] tracking-widest hover:text-white transition-colors uppercase btn-square px-3 py-1" onclick="event.stopPropagation();">EXIT</a>
            
            <div class="custom-ep-dropdown" onclick="event.stopPropagation();">
                <div class="ep-trigger flex items-center gap-2">
                    <span id="ep-title" class="text-white text-[10px] md:text-xs font-black uppercase tracking-[0.2em] truncate max-w-[150px] md:max-w-[300px]">LOADING...</span>
                    <svg class="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <div class="ep-menu">
                    <div class="ep-menu-content" id="ep-dropdown-list"></div>
                </div>
            </div>
        
            <div class="custom-lang-dropdown" onclick="event.stopPropagation();">
                <div class="lang-trigger flex items-center gap-1.5">
                    <svg class="w-3 h-3 text-blue-400 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z"/>
                    </svg>
                    <span id="current-lang-label" class="text-[10px] font-bold text-blue-400 uppercase">EN</span>
                </div>
                <div class="lang-menu">
                    <div class="lang-menu-content">
                        <div class="lang-item" onclick="setLanguage('EN')"><img src="https://flagcdn.com/us.svg" class="flag-icon"> English</div>
                        <div class="lang-item" onclick="setLanguage('ID')"><img src="https://flagcdn.com/id.svg" class="flag-icon"> Bahasa Indonesia</div>
                        <div class="lang-item" onclick="setLanguage('JP')"><img src="https://flagcdn.com/jp.svg" class="flag-icon"> 日本語</div>
                        <div class="lang-item" onclick="setLanguage('KR')"><img src="https://flagcdn.com/kr.svg" class="flag-icon"> 한국어</div>
                    </div>
                </div>
            </div>
        </nav>

        <main id="comic-container" class="webtoon-container"></main>

        <nav id="bottom-nav" class="immersive-ui bottom-ui fixed bottom-0 left-0 w-full bg-black/95 backdrop-blur-md border-t border-gray-800 p-4">
            <div class="max-w-md mx-auto flex items-center justify-between px-2">
                <button id="btn-prev" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 btn-square border border-zinc-700 text-[10px] font-bold text-white uppercase" onclick="event.stopPropagation();">&larr; Prev</button>
                <div class="text-center cursor-pointer group flex flex-col items-center gap-1" onclick="toggleDrawer(event)">
                    <svg class="w-6 h-6 text-gray-500 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    <span id="bottom-ep-number" class="text-[9px] font-bold text-gray-500 group-hover:text-blue-400 tracking-widest uppercase transition-colors">EP #1</span>
                </div>
                <button id="btn-next" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 btn-square text-[10px] font-bold text-white uppercase shadow-[0_0_15px_rgba(59,130,246,0.4)]" onclick="event.stopPropagation();">Next &rarr;</button>
            </div>
        </nav>
    </div>

    <div id="episode-drawer" class="fixed bottom-0 left-0 w-full bg-black/95 backdrop-blur-xl border-t border-zinc-800 p-6">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-white text-[10px] font-bold uppercase tracking-[0.2em]">Select Record</h3>
                <button onclick="toggleDrawer(event)" class="text-gray-500 hover:text-white text-[10px] font-bold uppercase">&times; Close</button>
            </div>
            <div id="drawer-list" class="drawer-scroll"></div>
        </div>
    </div>

    <button id="back-to-top" onclick="teleportToTop(event)" class="fixed right-6 bg-blue-600 hover:bg-blue-500 p-3 btn-square shadow-[0_0_20px_rgba(59,130,246,0.4)] z-40 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>

    <script>
    let currentEp = 1;
    let currentLang = 'EN';
    let uiVisible = false;

    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('preferredLang', lang);
        window.location.hash = lang;
        const ui = LUMINUS_DB.ui[lang];
        document.getElementById('nav-home-text').innerText = ui.home;
        document.getElementById('current-lang-label').innerText = lang;
        const epData = LUMINUS_DB.library[currentEp];
        if (epData) {
            document.getElementById('ep-title').innerText = epData.name[lang];
            document.getElementById('bottom-ep-number').innerText = "EP #" + currentEp;
        }
        populateMenus(lang);
        loadPages(); // Reload pages when language changes for placeholders
    }

    function populateMenus(lang) {
        const list = document.getElementById('drawer-list');
        const dropdownList = document.getElementById('ep-dropdown-list');
        list.innerHTML = '';
        dropdownList.innerHTML = '';
        const keys = Object.keys(LUMINUS_DB.library).sort((a, b) => parseInt(a) - parseInt(b));
        keys.forEach(id => {
            const ep = LUMINUS_DB.library[id];
            const isActive = (id == currentEp);
            const isUpcoming = ep.status === 'upcoming';
            const title = ep.name[lang];
            if (isUpcoming) {
                dropdownList.innerHTML += `<div class="ep-item opacity-40 cursor-not-allowed uppercase">${ep.dateLabel} - UPCOMING</div>`;
            } else {
                dropdownList.innerHTML += `<div class="ep-item ${isActive ? 'active-ep' : ''}" onclick="changeEpisode(${id})">${title}</div>`;
            }
            list.innerHTML += `
                <div class="flex-shrink-0 w-32 group cursor-pointer ${isActive ? 'opacity-100' : 'opacity-50 hover:opacity-100'} ${isUpcoming ? 'opacity-30 cursor-not-allowed' : ''}" 
                     onclick="${isUpcoming ? '' : `changeEpisode(${id})`}">
                    <img src="${isUpcoming ? 'images/placeholders/coming_soon.webp' : ep.thumb}" 
                         class="rounded-md border-2 ${isActive ? 'border-blue-500' : 'border-transparent group-hover:border-zinc-500'} transition shadow-lg aspect-[16/9] object-cover">
                    <p class="text-[9px] mt-2 ${isActive ? 'text-blue-400' : 'text-gray-400'} uppercase font-bold truncate">${isUpcoming ? ep.dateLabel : title}</p>
                </div>`;
        });
    }

    function updateNavButtons() {
        const prevBtn = document.getElementById('btn-prev');
        const nextBtn = document.getElementById('btn-next');
        const prevEp = currentEp - 1;
        const nextEp = currentEp + 1;
        const hasPrev = LUMINUS_DB.library[prevEp] && LUMINUS_DB.library[prevEp].status === 'released';
        const hasNext = LUMINUS_DB.library[nextEp] && LUMINUS_DB.library[nextEp].status === 'released';
        if (hasPrev) {
            prevBtn.classList.remove('opacity-30', 'cursor-not-allowed');
            prevBtn.onclick = (e) => { e.stopPropagation(); changeEpisode(prevEp); };
        } else {
            prevBtn.classList.add('opacity-30', 'cursor-not-allowed');
            prevBtn.onclick = (e) => { e.stopPropagation(); };
        }
        if (hasNext) {
            nextBtn.classList.remove('opacity-30', 'cursor-not-allowed');
            nextBtn.onclick = (e) => { e.stopPropagation(); changeEpisode(nextEp); };
        } else {
            nextBtn.classList.add('opacity-30', 'cursor-not-allowed');
            nextBtn.onclick = (e) => { e.stopPropagation(); };
        }
    }

    // SENTRY: "Rex Alice" Error Logic
    function handleImageError(img) {
        const container = document.getElementById('comic-container');
        // Clear all panels and show only ONE solid Rex Alice
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center py-24 px-10 text-center">
                <img src="images/placeholders/chibi-alice.png" class="w-64 h-auto mb-8 shadow-2xl rounded-xl" alt="Transmission Interrupted">
                <p class="text-[10px] font-bold tracking-[0.3em] text-gray-600 uppercase">Archive Transmission Interrupted</p>
                <button onclick="location.reload()" class="mt-8 text-[10px] text-blue-500 border border-blue-500/30 px-4 py-2 rounded-md uppercase font-bold">Retry Transmission</button>
            </div>`;
    }

    function loadPages() {
        const container = document.getElementById('comic-container');
        container.innerHTML = '';
        const epData = LUMINUS_DB.library[currentEp];
        if (!epData || epData.status !== 'released') return;

        // SENTRY: Placeholder for JP/KR
        if (currentLang === 'JP' || currentLang === 'KR') {
            const path = (currentLang === 'JP') ? 'images/tl-JP.webp' : 'images/tl-KR.webp';
            container.innerHTML = `<div class="comic-page"><img src="${path}" alt="Awaiting Translation"></div>`;
            return;
        }

        // Logic & Steel Pathing (0-based)
        for (let i = 0; i < epData.panels; i++) {
            container.innerHTML += `<div class="comic-page"><img src="images/ep${currentEp}/${i}.webp" alt="Record Panel ${i}" loading="lazy" onerror="handleImageError(this)"></div>`;
        }
    }

    function changeEpisode(newEp) { window.location.href = `reader.html?ep=${newEp}#${currentLang}`; }
    function toggleUI() {
        uiVisible = !uiVisible;
        document.getElementById('top-nav').classList.toggle('ui-active', uiVisible);
        document.getElementById('bottom-nav').classList.toggle('ui-active', uiVisible);
        const btn = document.getElementById('back-to-top');
        if (uiVisible && window.scrollY > 800) btn.classList.add('show-btn');
        else btn.classList.remove('show-btn');
    }
    function toggleDrawer(e) { if(e) e.stopPropagation(); document.getElementById('episode-drawer').classList.toggle('open'); }
    function teleportToTop(e) { e.stopPropagation(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

    function initReader() {
        const epParam = getQueryParam('ep');
        currentEp = epParam ? parseInt(epParam) : 1;
        if (!LUMINUS_DB.library[currentEp]) currentEp = 1;
        const savedLang = localStorage.getItem('preferredLang');
        const hashLang = window.location.hash.replace('#', '');
        setLanguage(hashLang || savedLang || 'EN');
        updateNavButtons();
    }

    window.onload = initReader;
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
