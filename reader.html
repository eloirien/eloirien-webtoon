<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverstring | Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #d1d5db;
            font-family: 'Inter', sans-serif;
            margin: 0;
            /* Prevents accidental text highlighting while clicking to toggle */
            user-select: none; 
            overflow-x: hidden;
        }

        /* The UI starts hidden for full immersion */
        .immersive-ui {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        
        .top-ui { transform: translateY(-100%); }
        .bottom-ui { transform: translateY(100%); }

        /* When active, the UI slides in */
        .ui-active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .webtoon-container {
            width: 100%;
            max-width: 800px; /* Adjust based on your panel width */
            margin: 0 auto;
            cursor: pointer; /* Hint to the reader that they can click */
        }

        .panel-container {
            position: relative;
            width: 100%;
            line-height: 0; /* Removes tiny gaps between panels */
        }

        .panel-container img {
            width: 100%;
            height: auto;
            display: block;
            -webkit-user-drag: none;
        }

        /* Protection Layer */
        .ghost-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            background: transparent;
        }

        #back-to-top {
            transition: all 0.3s ease;
            bottom: 100px;
        }
    </style>
</head>
<body onclick="toggleUI()">

    <nav id="top-nav" class="immersive-ui top-ui fixed top-0 left-0 w-full bg-black/90 backdrop-blur-md border-b border-gray-800 p-4 flex justify-between items-center z-50">
        <a href="index.html" class="text-blue-400 font-bold hover:text-blue-300 flex items-center text-xs tracking-widest" onclick="event.stopPropagation();">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="mr-2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            EXIT
        </a>
        <div class="text-center">
            <h1 class="text-[10px] uppercase tracking-tighter text-gray-500 font-bold">Silverstring</h1>
            <p class="text-[11px] text-white uppercase tracking-[0.2em]">Prologue: Storm</p>
        </div>
        <div class="w-12"></div>
    </nav>

    <main class="webtoon-container">
        <div class="panel-container">
            <img src="images/panel_01.webp" alt="Panel 1">
            <div class="ghost-layer"></div>
        </div>
        <div class="panel-container">
            <img src="images/panel_02.webp" alt="Panel 2">
            <div class="ghost-layer"></div>
        </div>
        <div class="panel-container">
            <img src="images/panel_03.webp" alt="Panel 3">
            <div class="ghost-layer"></div>
        </div>
    </main>

    <button id="back-to-top" onclick="scrollToTop(event)" class="fixed right-6 opacity-0 translate-y-10 bg-blue-600/80 backdrop-blur-md p-3 rounded-full border border-blue-400 z-40">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>

    <nav id="bottom-nav" class="immersive-ui bottom-ui fixed bottom-0 left-0 w-full bg-black/90 backdrop-blur-md border-t border-gray-800 p-4 z-50">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <button class="px-5 py-2 bg-gray-800/50 rounded-md text-[10px] font-bold text-gray-500 uppercase tracking-widest cursor-not-allowed" onclick="event.stopPropagation();">Prev</button>
            
            <div class="text-center">
                <span class="text-[9px] text-gray-500 uppercase font-bold tracking-tighter block">Chapter</span>
                <span class="text-xs font-bold text-white tracking-widest">01</span>
            </div>

            <button class="px-5 py-2 bg-blue-600 rounded-md text-[10px] font-bold text-white uppercase tracking-widest hover:bg-blue-500" onclick="event.stopPropagation();">Next</button>
        </div>
    </nav>

    <script>
        let uiVisible = false; // Starts immersive
        const topNav = document.getElementById('top-nav');
        const bottomNav = document.getElementById('bottom-nav');
        const backToTopBtn = document.getElementById('back-to-top');

        function toggleUI() {
            uiVisible = !uiVisible;
            if (uiVisible) {
                topNav.classList.add('ui-active');
                bottomNav.classList.add('ui-active');
            } else {
                topNav.classList.remove('ui-active');
                bottomNav.classList.remove('ui-active');
            }
        }

        window.onscroll = function() {
            if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
                backToTopBtn.classList.remove('opacity-0', 'translate-y-10');
            } else {
                backToTopBtn.classList.add('opacity-0', 'translate-y-10');
            }
        };

        function scrollToTop(e) {
            e.stopPropagation(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Standard Protection
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
