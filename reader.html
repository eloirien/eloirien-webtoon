<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverstring | Reader</title>
    <meta name="description" content="Explore the Project Bethlehem comic archives. Featuring the Bible-inspired Christian fantasy Silverstring and exclusive special episodes by artist Eloirien.">
    <meta property="og:title" content="Project Bethlehem | Official Christian Fantasy Comic Archives">
    <meta property="og:description" content="Browse the full collection of Bible-inspired stories and webtoons from the Kingdom of Luminus. Created by Eloirien.">
    <meta property="og:image" content="images/branding/covers/silverstring-main-cover.webp">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="content.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #0a0a0a; color: #d1d5db; font-family: 'Inter', sans-serif; user-select: none; }
        #global-click-zone { min-height: 100vh; width: 100%; cursor: pointer; position: relative; z-index: 10; }
        
        /* Immersive UI Logic */
        .immersive-ui { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; opacity: 0; pointer-events: none; z-index: 50; }
        .top-ui { transform: translateY(-100%); }
        .bottom-ui { transform: translateY(100%); }
        .ui-active { transform: translateY(0) !important; opacity: 1 !important; pointer-events: auto !important; }
        
        /* Dropdowns */
        .custom-lang-dropdown, .custom-ep-dropdown { position: relative; display: inline-block; }
        .lang-trigger, .ep-trigger { background-color: rgba(31, 41, 55, 0.6); border: 1px solid rgba(59, 130, 246, 0.3); color: #3b82f6; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .ep-trigger { background-color: transparent; border: none; color: white; padding: 6px 12px; }
        .lang-menu, .ep-menu { position: absolute; top: 100%; padding-top: 10px; display: none; flex-direction: column; z-index: 100; }
        .lang-menu { right: 0; width: 180px; }
        .ep-menu { left: 50%; transform: translateX(-50%); width: 220px; max-height: 50vh; overflow-y: auto; }
        .lang-menu-content, .ep-menu-content { background-color: #1a1a1a; border: 1px solid #333; border-radius: 6px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        .lang-item, .ep-item { padding: 12px 16px; font-size: 11px; display: flex; align-items: center; gap: 10px; color: #E0E0E0; border-bottom: 1px solid #1f1f1f; transition: background 0.2s; cursor: pointer; }
        .ep-item { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; }
        .lang-item:hover, .ep-item:hover { background-color: #2d2d2d; color: #3b82f6; }
        .ep-item.active-ep { background-color: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .custom-lang-dropdown:hover .lang-menu, .custom-ep-dropdown:hover .ep-menu { display: flex; }
        .flag-icon { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; }

        /* Drawer */
        #episode-drawer { transform: translateY(100%); transition: transform 0.4s ease; z-index: 60; }
        #episode-drawer.open { transform: translateY(0); }
        .drawer-scroll { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; scrollbar-width: none; }
        .drawer-scroll::-webkit-scrollbar { display: none; }

        .webtoon-container { width: 100%; max-width: 800px; margin: 0 auto; line-height: 0; padding-bottom: 6rem; position: relative; z-index: 20; }
        img { width: 100%; display: block; -webkit-user-drag: none; background-color: #0a0a0a; }

        .btn-square { border-radius: 6px; transition: all 0.3s ease; }

        #back-to-top {
        bottom: -100px; /* Hidden by default */
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 0;
        pointer-events: none;
        }
        #back-to-top.show-btn {
            bottom: 30px; 
            opacity: 1;
            pointer-events: auto;
        }
            
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="global-click-zone">

        <nav id="top-nav" class="immersive-ui top-ui fixed top-0 left-0 w-full bg-black/95 backdrop-blur-md border-b border-gray-800 p-4 flex justify-between items-center">
            <a href="index.html" id="nav-home-text" class="text-blue-400 font-bold text-[10px] tracking-widest hover:text-white transition-colors uppercase btn-square px-3 py-1">EXIT</a>
            
            <div class="custom-ep-dropdown">
                <div class="ep-trigger flex items-center gap-2">
                    <h1 id="ep-title" class="text-white text-[10px] md:text-xs font-black uppercase tracking-[0.2em] truncate max-w-[150px] md:max-w-[300px] inline-block">LOADING...</h1>
                    <svg class="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></>
                </div>
                <div class="ep-menu">
                    <div class="ep-menu-content" id="ep-dropdown-list"></div>
                </div>
            </div>
        
            <div class="custom-lang-dropdown">
                <div class="lang-trigger flex items-center gap-1.5">
                    <svg class="w-3 h-3 text-blue-400 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/">
                        <path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z"/>
                    </svg>
                    <span id="current-lang-label" class="text-[10px] font-bold text-blue-400 uppercase">EN</span>
                </div>
                <div class="lang-menu">
                    <div class="lang-menu-content">
                        <div class="lang-item" onclick="setLanguage('EN')"><img src="https://flagcdn.com/us.svg" class="flag-icon"> English</div>
                        <div class="lang-item" onclick="setLanguage('ID')"><img src="https://flagcdn.com/id.svg" class="flag-icon"> Bahasa Indonesia</div>
                        <div class="lang-item" onclick="setLanguage('JA')"><img src="https://flagcdn.com/jp.svg" class="flag-icon"> 日本語</div>
                        <div class="lang-item" onclick="setLanguage('KO')"><img src="https://flagcdn.com/kr.svg" class="flag-icon"> 한국어</div>
                    </div>
                </div>
            </div>
        </nav>

        <main id="comic-container" class="webtoon-container" onclick="toggleUI()"></main>

        <nav id="bottom-nav" class="immersive-ui bottom-ui fixed bottom-0 left-0 w-full bg-black/95 backdrop-blur-md border-t border-gray-800 p-4">
            <div class="max-w-md mx-auto flex items-center justify-between px-2">
                <button id="btn-prev" class="px-5 py-2 bg-blue-600/90 hover:bg-blue-500 btn-square text-[10px] font-bold text-white uppercase shadow-[0_0_10px_rgba(59,130,246,0.3)] transition-all">&larr; Prev</button>
                <div class="text-center cursor-pointer group flex flex-col items-center gap-1" onclick="toggleDrawer(event)">
                    <svg class="w-6 h-6 text-gray-500 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    <span id="bottom-ep-number" class="text-[9px] font-bold text-gray-500 group-hover:text-blue-400 tracking-widest uppercase transition-colors">EP #1</span>
                </div>
                <button id="btn-next" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 btn-square text-[10px] font-bold text-white uppercase shadow-[0_0_15px_rgba(59,130,246,0.4)] transition-all">Next &rarr;</button>
            </div>
        </nav>
    </div>

    <div id="episode-drawer" class="fixed bottom-0 left-0 w-full bg-black/95 backdrop-blur-xl border-t border-zinc-800 p-6">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-white text-[10px] font-bold uppercase tracking-[0.2em]">Select Record</h3>
                <button onclick="toggleDrawer(event)" class="text-gray-500 hover:text-white text-[10px] font-bold uppercase">&times; Close</button>
            </div>
            <div id="drawer-list" class="drawer-scroll"></div>
        </div>
    </div>

    <button id="back-to-top" onclick="teleportToTop(event)" class="fixed right-6 bg-blue-600 hover:bg-blue-500 p-3 btn-square shadow-[0_0_20px_rgba(59,130,246,0.4)] z-40 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>

    <script>

<script>
            let currentEp; // The Sovereign Variable
            let currentLang = 'EN';
            let uiVisible = false;

            function initReader() {
                // 1. PRIORITY LOGIC: Check URL first, then Memory, then Fallback
                const urlEpisode = getQueryParam('ep');
                if (urlEpisode) {
                    currentEp = parseInt(urlEpisode);
                } else {
                    currentEp = parseInt(localStorage.getItem('lastVisitedEpisode')) || 1;
                }

                // 2. SAFETY CHECK: Ensure the episode exists in your Database
                if (!LUMINUS_DB.library[currentEp]) {
                    currentEp = 1;
                }

                // 3. SAVE THE VISIT: Update memory so the index "Continue" button works
                localStorage.setItem('lastVisitedEpisode', currentEp);

                // 4. METADATA OVERHAUL: Plant the seeds for the Librarian
                const epData = LUMINUS_DB.library[currentEp];
                if (epData) {
                    document.title = `Silverstring Ep. ${currentEp}: ${epData.name[currentLang]} | Official Archive`;
                    let metaDesc = document.querySelector('meta[name="description"]');
                    if (metaDesc) {
                        metaDesc.content = `Read Silverstring Episode ${currentEp}. Join Archius and Alice in the Kingdom of Luminus. Created by Eloirien.`;
                    }
                }

                // 5. LANGUAGE SYNC
                const savedLang = localStorage.getItem('preferredLang');
                const hashLang = window.location.hash.replace('#', '');
                setLanguage(hashLang || savedLang || 'EN');
            }

            function getQueryParam(param) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param);
            }

            // ... (Rest of your helper functions: setLanguage, syncEpisodeInfo, etc.)

        
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('dragstart', e => e.preventDefault());

            window.addEventListener('scroll', () => {
            const btn = document.getElementById('back-to-top');
            if (window.scrollY > 400) {
                btn.classList.add('show-btn');
            } else {
                btn.classList.remove('show-btn');
            }
            });
        
            function teleportToTop(e) {
                if(e) e.stopPropagation();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        
    </script>
</body>
</html>
