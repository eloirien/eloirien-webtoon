<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverstring | Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #0a0a0a;
            color: #d1d5db;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        #global-click-zone {
            min-height: 100vh;
            width: 100%;
            cursor: pointer;
            position: relative;
            z-index: 10;
        }

        .immersive-ui {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        
        .top-ui { transform: translateY(-100%); }
        .bottom-ui { transform: translateY(100%); }

        .ui-active {
            transform: translateY(0) !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        .webtoon-container {
            width: 100%;
            max-width: 800px; 
            margin: 0 auto;
            line-height: 0;
        }

        .panel-container { position: relative; width: 100%; }
        
        .ghost-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            background: transparent;
        }

        img { 
            width: 100%; 
            display: block; 
            -webkit-user-drag: none; 
            background-color: #0a0a0a;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="global-click-zone" onclick="toggleUI()">

        <nav id="top-nav" class="immersive-ui top-ui fixed top-0 left-0 w-full bg-black/95 backdrop-blur-md border-b border-gray-800 p-4 flex justify-between items-center">
            <a href="index.html" class="text-blue-400 font-bold text-xs tracking-widest" onclick="event.stopPropagation();">EXIT</a>
            <div class="text-center">
                <p class="text-[10px] text-white uppercase tracking-[0.2em]">Prologue: Storm</p>
            </div>
            <div class="w-8"></div>
        </nav>

        <main id="reader-main" class="webtoon-container">
            </main>

        <nav id="bottom-nav" class="immersive-ui bottom-ui fixed bottom-0 left-0 w-full bg-black/95 backdrop-blur-md border-t border-gray-800 p-4">
            <div class="max-w-md mx-auto flex items-center justify-between">
                <button class="text-[10px] font-bold text-gray-600 uppercase" onclick="event.stopPropagation();">Prev</button>
                <div class="text-center">
                    <span class="text-[9px] text-gray-500 uppercase font-bold block">Chapter</span>
                    <span class="text-xs font-bold text-white tracking-widest">01</span>
                </div>
                <button class="px-6 py-2 bg-blue-600 rounded-md text-[10px] font-bold text-white uppercase" onclick="event.stopPropagation();">Next</button>
            </div>
        </nav>

    </div>

    <script>
        const totalPages = 22;
        const readerMain = document.getElementById('reader-main');

        // Logic to generate all 22 protected panels automatically
        for (let i = 1; i <= totalPages; i++) {
            // Formats number to 01, 02, etc. to match your filenames
            const pageNum = i.toString().padStart(2, '0'); 
            const panelHtml = `
                <div class="panel-container">
                    <img src="images/episodes/ep1/ep1_${pageNum}_ID.webp" alt="Page ${pageNum}" loading="lazy">
                    <div class="ghost-layer"></div>
                </div>
            `;
            readerMain.innerHTML += panelHtml;
        }

        let uiVisible = false;
        const topNav = document.getElementById('top-nav');
        const bottomNav = document.getElementById('bottom-nav');

        function toggleUI() {
            uiVisible = !uiVisible;
            topNav.classList.toggle('ui-active', uiVisible);
            bottomNav.classList.toggle('ui-active', uiVisible);
        }

        // Global Protection
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
