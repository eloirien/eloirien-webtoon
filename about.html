<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Eloirien</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: #E0E0E0; margin: 0; overflow-x: hidden; }
        
        /* Navigation Pill - uppercase for Links */
        .nav-container { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: center; padding-top: 2rem; padding-left: 15px; padding-right: 15px; pointer-events: none; }
        .nav-pill { pointer-events: auto; background-color: rgba(13, 13, 13, 0.95); backdrop-filter: blur(20px) saturate(180%); padding: 6px 16px; border-radius: 9999px; border: 2px solid rgba(255, 255, 255, 0.25); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); display: flex; align-items: center; gap: 12px; height: 42px; margin: 0 auto; }
        .nav-link { color: #9ca3af; text-transform: uppercase; font-size: 10px; font-weight: 500; letter-spacing: 0.05em; transition: color 0.3s; cursor: pointer; }
        .nav-link:hover { color: #3b82f6; }

        /* Infinity Blur Background */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('images/cover.webp'); background-size: cover; background-position: center; filter: blur(60px) brightness(0.2); transform: scale(1.1); }

        /* Article Room */
        .article-room { max-width: 700px; margin: 8rem auto 4rem auto; background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 3rem 2rem; position: relative; z-index: 10; }
        .section-divider { height: 1px; width: 100%; background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent); margin: 3rem 0; }
        
        /* Language Dropdown */
        .custom-lang-dropdown { position: relative; display: flex; align-items: center; }
        .lang-trigger { background-color: rgba(31, 41, 55, 0.6); border: 1px solid rgba(59, 130, 246, 0.3); color: #3b82f6; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .lang-menu { position: absolute; top: 100%; right: 0; padding-top: 15px; display: none; flex-direction: column; z-index: 2000; width: 180px; }
        .lang-menu-content { background-color: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .lang-item { padding: 12px; font-size: 11px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #E0E0E0; border-bottom: 1px solid #1f1f1f; transition: background 0.2s; }
        .lang-item:hover { background-color: #2d2d2d; color: #3b82f6; }
        .flag-icon { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; }
        .custom-lang-dropdown:hover .lang-menu { display: flex; }

        .logo-placeholder { width: 100%; max-width: 200px; height: auto; margin-bottom: 1rem; }

        img { -webkit-user-drag: none; user-select: none; }
    </style>
</head>
<body>

    <div class="bg-wrapper"><div class="bg-blur"></div></div>

    <nav class="nav-container">
        <div class="nav-pill">
            <span class="text-white font-bold tracking-[0.2em] text-[10px] uppercase">E L O I R I E N</span>
            <div class="h-4 w-[1px] bg-gray-800"></div>
            <a href="index.html" class="nav-link nav-link-home">home</a>
            <a href="comics.html" class="nav-link nav-link-comics">comics</a>
            
            <div class="custom-lang-dropdown">
                <div class="lang-trigger text-[10px]">🌐 <span id="current-lang-label" class="uppercase">EN</span></div>
                <div class="lang-menu">
                    <div class="lang-menu-content">
                        <div class="lang-item" onclick="setLanguage('EN')"><img src="https://flagcdn.com/us.svg" class="flag-icon"> English</div>
                        <div class="lang-item" onclick="setLanguage('ID')"><img src="https://flagcdn.com/id.svg" class="flag-icon"> Bahasa Indonesia</div>
                        <div class="lang-item" onclick="setLanguage('JP')"><img src="https://flagcdn.com/jp.svg" class="flag-icon"> 日本語</div>
                        <div class="lang-item" onclick="setLanguage('KR')"><img src="https://flagcdn.com/kr.svg" class="flag-icon"> 한국어</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="article-room shadow-2xl">
        <section class="flex flex-col items-center text-center space-y-6">
            <img src="images/profile.webp" class="w-32 h-32 rounded-full border-2 border-blue-500/50 object-cover shadow-lg">
            <div>
                <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Eloirien</h2>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">Illustrator & Comic Artist</p>
            </div>
            <div id="text-creator" class="text-sm text-gray-400 leading-relaxed text-left">
                </div>
        </section>

        <div class="section-divider"></div>

        <section class="space-y-4">
            <img src="images/logo.png" alt="Silverstring" class="logo-placeholder">
            <div id="text-silverstring" class="text-sm text-gray-400 leading-relaxed">
                </div>
        </section>

        <div class="section-divider"></div>

        <section class="space-y-4">
            <img src="images/bethlehem-logo.png" alt="Project Bethlehem" class="logo-placeholder">
            <div id="text-bethlehem" class="text-sm text-gray-400 leading-relaxed">
                </div>
        </section>

        <footer class="mt-12 pt-8 border-t border-gray-800 text-center">
            <p class="text-[10px] text-gray-600 uppercase tracking-widest">Copyright 2026 © Eloirien. All Rights Reserved.</p>
        </footer>
    </main>

    <script>
        const aboutContent = {
            EN: {
                navHome: "home", navComics: "comics",
                creator: "Dey, known as Eloirien, is a professional illustrator based in Indonesia with years of experience in the webtoon industry. Specializing in cinematic aesthetics and sustainable creative workflows.",
                silverstring: "Silverstring is an original high-fantasy webtoon following the intertwined destinies of Princess Alicia and Crown Prince Archius in the Kingdom of Luminus.",
                bethlehem: "Project Bethlehem serves as the creative umbrella for the independent intellectual properties developed by Eloirien."
            },
            ID: {
                navHome: "home", navComics: "komik",
                creator: "Dey, yang dikenal sebagai Eloirien, adalah ilustrator profesional asal Indonesia dengan pengalaman bertahun-tahun di industri webtoon.",
                silverstring: "Silverstring adalah webtoon fantasi orisinal yang mengikuti takdir Alicia dan Archius di Kerajaan Luminus.",
                bethlehem: "Project Bethlehem berfungsi sebagai payung kreatif untuk kekayaan intelektual independen yang dikembangkan oleh Eloirien."
            },
            JP: {
                navHome: "ホーム", navComics: "コミック",
                creator: "インドネシアを拠点に活動するプロのイラストレーター、Eloirien（Dey）。ウェブトゥーン業界での豊富な経験を持ちます。",
                silverstring: "『シルバーストリング』は、ルミナス王国のアリシア王女とアルキウス王太子の運命を描くオリジナル・ファンタジー。",
                bethlehem: "プロジェクト・ベツレヘムは、Eloirienが展開するインディーIPのクリエイティブ・アンブレラ。"
            },
            KR: {
                navHome: "홈", navComics: "코믹스",
                creator: "Eloirien(Dey)은 인도네시아의 프로 일러스트레이터로, 웹툰 업계에서 다년간의 경험을 쌓았습니다.",
                silverstring: "실버스링은 루미누스 왕국의 알리시아 공주와 아르키우스 왕세자의 운명을 다룬 오리지널 판타지 웹툰입니다.",
                bethlehem: "프로젝트 베들레헴은 Eloirien이 개발하는 독립 IP의 크리에이티브 우산입니다."
            }
        };

        function setLanguage(lang) {
            const dict = aboutContent[lang] || aboutContent.EN;
            document.querySelector('.nav-link-home').innerText = dict.navHome;
            document.querySelector('.nav-link-comics').innerText = dict.navComics;
            document.getElementById('current-lang-label').innerText = lang;
            
            document.getElementById('text-creator').innerText = dict.creator;
            document.getElementById('text-silverstring').innerText = dict.silverstring;
            document.getElementById('text-bethlehem').innerText = dict.bethlehem;

            window.location.hash = lang;
        }

        window.onload = () => {
            const initialLang = window.location.hash.replace('#', '') || 'EN';
            setLanguage(initialLang);
        };

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
