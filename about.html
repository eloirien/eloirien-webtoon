<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Eloirien</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: #E0E0E0; margin: 0; overflow-x: hidden; }
        
        /* Navigation Pill */
        .nav-container { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: center; padding-top: 2rem; padding-left: 15px; padding-right: 15px; pointer-events: none; }
        .nav-pill { pointer-events: auto; background-color: rgba(13, 13, 13, 0.95); backdrop-filter: blur(20px) saturate(180%); padding: 6px 16px; border-radius: 9999px; border: 2px solid rgba(255, 255, 255, 0.25); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); display: flex; align-items: center; gap: 12px; height: 42px; margin: 0 auto; }
        .nav-link { color: #9ca3af; text-transform: uppercase; font-size: 10px; font-weight: 500; letter-spacing: 0.05em; transition: color 0.3s; cursor: pointer; }
        .nav-link:hover { color: #3b82f6; }

        /* Infinity Blur Background */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('images/cover.webp'); background-size: cover; background-position: center; filter: blur(25px) brightness(0.2); transform: scale(1.1); }

        /* Article Room - Centered with Ample Margins */
        .article-room { 
            max-width: 768px; 
            margin: 8rem auto 4rem auto; 
            background: rgba(20, 20, 20, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 40px; 
            padding: 5rem 4rem; /* Increased padding for ample margin */
            position: relative; 
            z-index: 10; 
        }

        .section-divider { height: 1px; width: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent); margin: 4rem 0; }
        
        /* Language Dropdown */
        .custom-lang-dropdown { position: relative; display: flex; align-items: center; }
        .lang-trigger { background-color: rgba(31, 41, 55, 0.6); border: 1px solid rgba(59, 130, 246, 0.3); color: #3b82f6; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .lang-menu { position: absolute; top: 100%; right: 0; padding-top: 15px; display: none; flex-direction: column; z-index: 2000; width: 180px; }
        .lang-menu-content { background-color: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .lang-item { padding: 12px; font-size: 11px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #E0E0E0; border-bottom: 1px solid #1f1f1f; transition: background 0.2s; }
        .lang-item:hover { background-color: #2d2d2d; color: #3b82f6; }
        .flag-icon { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; }
        .custom-lang-dropdown:hover .lang-menu { display: flex; }

        /* Logos Centered */
        .logo-placeholder { width: 100%; max-width: 280px; height: auto; margin: 0 auto 2rem auto; display: block; }
        
        /* Wall of Text - Justified */
        .justified-text { text-align: justify; text-justify: inter-word; }

        img { -webkit-user-drag: none; user-select: none; }
    </style>
</head>
<body>

    <div class="bg-wrapper"><div class="bg-blur"></div></div>

    <nav class="nav-container">
        <div class="nav-pill">
            <span class="text-white font-bold tracking-[0.2em] text-[10px] uppercase">E L O I R I E N</span>
            <div class="h-4 w-[1px] bg-gray-800"></div>
            <a href="index.html" class="nav-link nav-link-home">home</a>
            <a href="comics.html" class="nav-link nav-link-comics">comics</a>
            
            <div class="custom-lang-dropdown">
                <div class="lang-trigger text-[10px]">🌐 <span id="current-lang-label" class="uppercase">EN</span></div>
                <div class="lang-menu">
                    <div class="lang-menu-content">
                        <div class="lang-item" onclick="setLanguage('EN')"><img src="https://flagcdn.com/us.svg" class="flag-icon"> English</div>
                        <div class="lang-item" onclick="setLanguage('ID')"><img src="https://flagcdn.com/id.svg" class="flag-icon"> Bahasa Indonesia</div>
                        <div class="lang-item" onclick="setLanguage('JP')"><img src="https://flagcdn.com/jp.svg" class="flag-icon"> 日本語</div>
                        <div class="lang-item" onclick="setLanguage('KR')"><img src="https://flagcdn.com/kr.svg" class="flag-icon"> 한국어</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="article-room shadow-2xl">
        <section class="flex flex-col items-center text-center">
            <img src="images/profile.webp" class="w-32 h-32 rounded-full border-2 border-blue-500/50 object-cover shadow-lg mb-6">
            <div>
                <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Eloirien</h2>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest mb-8">Illustrator & Comic Artist</p>
            </div>
            <div id="text-creator" class="text-sm text-gray-400 leading-relaxed justified-text whitespace-pre-line">
                </div>
        </section>

        <div class="section-divider"></div>

        <section class="flex flex-col items-center">
            <img src="images/logo.png" alt="Silverstring" class="logo-placeholder">
            <div id="text-silverstring" class="text-sm text-gray-400 leading-relaxed justified-text">
                </div>
        </section>

        <div class="section-divider"></div>

        <section class="flex flex-col items-center">
            <img src="images/bethlehem-logo.png" alt="Project Bethlehem" class="logo-placeholder">
            <div id="text-bethlehem" class="text-sm text-gray-400 leading-relaxed justified-text">
                </div>
        </section>

        <footer class="mt-12 pt-8 border-t border-gray-800 text-center">
            <p class="text-[10px] text-gray-600 uppercase tracking-widest">Copyright 2026 © Eloirien. All Rights Reserved.</p>
        </footer>
    </main>

    <script>
        const aboutContent = {
            EN: {
                navHome: "home", navComics: "comics",
                creator: "**As a passionate storyteller with more than three years of experience creating digital comics and illustrations, my goal is to tell stories that touch souls and hearts for the glory of God.**\n\n*I'm truly inspired by the greatest storyteller of all time: Jesus Christ. For me, every brushstroke is a prayer. I hope my art will be a blessing to you as much as it is a blessing to me.*",
                silverstring: "Silverstring is a passion project that I do on the side, in my free time, and completely solo right now, so updates might be slow and irregular. Still, I'll do my best to continue working on it.",
                bethlehem: "Project Bethlehem serves as the creative umbrella for the independent intellectual properties developed by Eloirien."
            },
            ID: {
                navHome: "home", navComics: "komik",
                creator: "**Sebagai pencerita yang penuh semangat dengan lebih dari tiga tahun pengalaman menciptakan komik digital dan ilustrasi, tujuan saya adalah menceritakan kisah yang menyentuh hati dan jiwa demi kemuliaan Tuhan.**\n\n*Saya sangat terinspirasi oleh pencerita terhebat sepanjang masa: Yesus Kristus. Bagi saya, setiap sapuan kuas adalah doa. Saya berharap karya saya menjadi berkat bagi Anda sebagaimana ia menjadi berkat bagi saya.*",
                silverstring: "Silverstring adalah proyek idealis yang saya kerjakan sebagai sampingan di waktu luang. Saat ini saya mengerjakannya sepenuhnya sendirian, jadi jadwal update mungkin akan terasa lambat dan tidak menentu. Meski begitu, saya akan berusaha sebaik mungkin untuk terus melanjutkan proyek ini.",
                bethlehem: "Project Bethlehem berfungsi sebagai payung kreatif untuk kekayaan intelektual independen yang dikembangkan oleh Eloirien."
            },
            JP: {
                navHome: "ホーム", navComics: "コミック",
                creator: "**デジタルコミックやイラスト制作で3年以上の経験を持つストーリーテラーとして、私の目標は神の栄光のために魂と心に響く物語を伝えることです。**\n\n*私は史上最高のストーリーテラーであるイエス・キリストから真にインスピレーションを受けています。私にとって、すべての筆致は祈りです。私の作品が私にとっての祝福であるのと同じくらい、あなたにとっても祝福となることを願っています。*",
                silverstring: "「Silverstring」は、私が空いた時間に個人で制作している情熱プロジェクト（パッションプロジェクト）です。現在はすべて一人で作業しているため、更新が遅れたり不定期になったりするかもしれません。それでも、描き続けられるよう精一杯頑張りますので、どうぞよろしくお願いいたします。",
                bethlehem: "プロジェクト・ベツレヘムは、Eloirienが展開するインディーIPのクリエイティブ・アンブレラ。"
            },
            KR: {
                navHome: "홈", navComics: "코믹스",
                creator: "**디지털 코믹스와 일러스트레이션 제작 분야에서 3년 이상의 경험을 쌓은 열정적인 스토리텔러로서, 제 목표는 하나님의 영광을 위해 영혼과 마음을 울리는 이야기를 전하는 것입니다.**\n\n*저는 역사상 위대한 스토리텔러인 예수 그리스도에게서 진정한 영감을 얻습니다. 저에게 모든 붓터치는 기도입니다. 제 예술이 저에게 축복인 만큼 여러분에게도 축복이 되기를 바랍니다.*",
                silverstring: "「Silverstring」은 제가 개인적인 시간에 틈틈이 작업하고 있는 열정 프로젝트(passion project)입니다. 현재는 모든 과정을 혼자서 진행하고 있어 업데이트가 다소 늦어지거나 불규칙할 수 있습니다. 그럼에도 최선을 다해 꾸준히 연재할 수 있도록 노력하겠습니다. 항상 감사드립니다.",
                bethlehem: "프로젝트 베들레헴은 Eloirien이 개발하는 독립 IP의 크리에이티브 우산입니다."
            }
        };

        function setLanguage(lang) {
            const dict = aboutContent[lang] || aboutContent.EN;
            document.querySelector('.nav-link-home').innerText = dict.navHome;
            document.querySelector('.nav-link-comics').innerText = dict.navComics;
            document.getElementById('current-lang-label').innerText = lang;
            
            const formattedCreator = dict.creator
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>')
                .replace(/\*(.*?)\*/g, '<em class="text-gray-500 italic">$1</em>');
            
            document.getElementById('text-creator').innerHTML = formattedCreator;
            document.getElementById('text-silverstring').innerText = dict.silverstring;
            document.getElementById('text-bethlehem').innerText = dict.bethlehem;

            window.location.hash = lang;
        }

        window.onload = () => {
            const initialLang = window.location.hash.replace('#', '') || 'EN';
            setLanguage(initialLang);
        };

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
