<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Eloirien | Christian Artist & Webtoon Creator</title>
    <link rel="canonical" href="https://eloirien.com/about.html">
    <meta name="description" content="Discover the creative journey of Eloirien, a Christian artist and illustrator. Learn about the Bible-inspired vision behind Silverstring webtoon and Project Bethlehem.">
    <meta property="og:title" content="About Eloirien | Christian Artist and Storyteller">
    <meta property="og:description" content="Meet the artist behind the Kingdom of Luminus and explore a portfolio built on faith and logic.">
    <meta property="og:image" content="images/branding/covers/silverstring-main-cover.webp">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="content.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: #E0E0E0; margin: 0; overflow-x: hidden; }
        
        /* Navigation Pill */
        .nav-container { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: center; padding-top: 2rem; padding-left: 15px; padding-right: 15px; pointer-events: none; }
        .nav-pill { pointer-events: auto; background-color: rgba(13, 13, 13, 0.95); backdrop-filter: blur(20px) saturate(180%); padding: 6px 16px; border-radius: 9999px; border: 2px solid rgba(255, 255, 255, 0.25); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); display: flex; align-items: center; gap: 12px; height: 42px; margin: 0 auto; }
        .nav-link { color: #9ca3af; text-transform: uppercase; font-size: 10px; font-weight: 500; letter-spacing: 0.05em; transition: color 0.3s; cursor: pointer; }
        .nav-link:hover { color: #3b82f6; }

        /* Infinity Blur Background */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('images/branding/banner/silverstring-main-banner.webp'); background-size: cover; background-position: center; filter: blur(25px) brightness(0.2); transform: scale(1.1); }

        /* Article Room - Centered with Ample Margins */
        .article-room { 
            max-width: 768px; 
            margin: 8rem auto 4rem auto; 
            background: rgba(20, 20, 20, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 40px; 
            padding: 5rem 4rem; /* Increased padding for ample margin */
            position: relative; 
            z-index: 10; 
        }

        .section-divider { height: 1px; width: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent); margin: 4rem 0; }
        
        /* Language Dropdown */
        .custom-lang-dropdown { position: relative; display: flex; align-items: center; }
        .lang-trigger { background-color: rgba(31, 41, 55, 0.6); border: 1px solid rgba(59, 130, 246, 0.3); color: #3b82f6; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .lang-menu { position: absolute; top: 100%; right: 0; padding-top: 15px; display: none; flex-direction: column; z-index: 2000; width: 180px; }
        .lang-menu-content { background-color: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .lang-item { padding: 12px; font-size: 11px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #E0E0E0; border-bottom: 1px solid #1f1f1f; transition: background 0.2s; }
        .lang-item:hover { background-color: #2d2d2d; color: #3b82f6; }
        .flag-icon { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; }
        .custom-lang-dropdown:hover .lang-menu { display: flex; }

        /* Logos Centered */
        .logo-placeholder { width: 100%; max-width: 280px; height: auto; margin: 0 auto 2rem auto; display: block; }
        
        /* Wall of Text - Justified */
        .justified-text { text-align: justify; text-justify: inter-word; }

        img { -webkit-user-drag: none; user-select: none; }
        
        #back-to-top {
            bottom: -100px; /* Hidden by default */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
        }
        #back-to-top.show-btn {
            bottom: 30px; 
            opacity: 1;
            pointer-events: auto;
        }
        
    </style>
</head>
<body>

    <div class="bg-wrapper"><div class="bg-blur"></div></div>

    <nav class="nav-container">
        <div class="nav-pill">
            <span class="text-white font-bold tracking-[0.2em] text-[10px] uppercase">E L O I R I E N</span>
            <div class="h-4 w-[1px] bg-gray-800"></div>
            <a href="index.html" class="nav-link nav-link-home">home</a>
            <a href="comics.html" class="nav-link nav-link-comics">comics</a>
            
            <div class="custom-lang-dropdown">
                <div class="lang-trigger text-[10px]">🌐 <span id="current-lang-label" class="uppercase">EN</span></div>
                <div class="lang-menu">
                    <div class="lang-menu-content">
                        <div class="lang-item" onclick="setLanguage('EN')"><img src="https://flagcdn.com/us.svg" class="flag-icon"> English</div>
                        <div class="lang-item" onclick="setLanguage('ID')"><img src="https://flagcdn.com/id.svg" class="flag-icon"> Bahasa Indonesia</div>
                        <div class="lang-item" onclick="setLanguage('JA')"><img src="https://flagcdn.com/jp.svg" class="flag-icon"> 日本語</div>
                        <div class="lang-item" onclick="setLanguage('KO')"><img src="https://flagcdn.com/kr.svg" class="flag-icon"> 한국어</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="article-room shadow-2xl">
        <section class="flex flex-col items-center text-center">
            <img src="images/creator/eloirien-author-pfp-2026.webp" alt="Professional avatar of Eloirien, the illustrator and comic artist behind Silverstring." class="w-32 h-32 rounded-full border-2 border-blue-500/50 object-cover shadow-lg mb-6">
            <div>
                <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Eloirien</h2>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest mb-8">Illustrator & Comic Artist</p>
            </div>
            <div id="text-creator" class="text-sm text-gray-300 leading-relaxed justified-text whitespace-pre-line">
                </div>
        </section>

        <div class="section-divider"></div>

        <section class="flex flex-col items-center">
            <img src="images/branding/logo/silverstring-logo.png" alt="Silverstring" class="logo-placeholder">
            <div id="text-silverstring" class="text-sm text-gray-300 leading-relaxed justified-text">
                </div>
        </section>

        <div class="section-divider"></div>

        <section class="flex flex-col items-center">
            <img src="images/branding/logo/project-bethlehem-logo.png" alt="Project Bethlehem" class="logo-placeholder">
            <div id="text-bethlehem" class="text-sm text-gray-300 leading-relaxed justified-text">
                </div>
        </section>

        <div class="section-divider"></div>
        <div id="social-media-container"></div>
        
    </main>

        <button id="back-to-top" onclick="teleportToTop(event)" class="fixed right-6 bg-blue-600 hover:bg-blue-500 p-3 rounded-md shadow-[0_0_20px_rgba(59,130,246,0.4)] z-50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </button>

        <script>
           function setLanguage(lang) {
            document.documentElement.lang = lang.toLowerCase();    
               
            localStorage.setItem('preferredLang', lang);
              
            // Fetch from LUMINUS_DB
            const ui = LUMINUS_DB.ui[lang];
            const page = LUMINUS_DB.pages.about[lang];
            
            // Update Navigation Pill
            document.querySelector('.nav-link-home').innerText = page.navHome;
            document.querySelector('.nav-link-comics').innerText = page.navComics;
            document.getElementById('current-lang-label').innerText = lang;
            
            // Helper to format text (Bold, Italic, and Line Breaks)
            const formatText = (rawText) => {
                return rawText
                    .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>') // Bold
                    .replace(/\*(.*?)\*/g, '<em class="text-gray-400 italic">$1</em>')  // Italic
                    .replace(/\n/g, '<br>'); // Converts new lines to HTML breaks
            };
            
            // Inject formatted content
            document.getElementById('text-creator').innerHTML = formatText(page.creator);
            document.getElementById('text-silverstring').innerHTML = formatText(page.silverstring);
            document.getElementById('text-bethlehem').innerHTML = formatText(page.bethlehem);

               injectSocialMedia('social-media-container');
        
            window.location.hash = lang;
            }
        
            // 2. The Sentry on Load
            window.onload = () => {
            const savedLang = localStorage.getItem('preferredLang');
            const hashLang = window.location.hash.replace('#', '');
            const finalLang = hashLang || savedLang || 'EN';
            
            setLanguage(finalLang);
            };
        
        // Art Protection 
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());

            window.addEventListener('scroll', () => {
            const btn = document.getElementById('back-to-top');
            if (window.scrollY > 400) {
                btn.classList.add('show-btn');
            } else {
                btn.classList.remove('show-btn');
            }
        });
        
            function teleportToTop(e) {
                if(e) e.stopPropagation();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        
        </script>

     <footer class="w-full py-16 border-t border-gray-900 bg-black/50 backdrop-blur-md flex flex-col items-center">
        <p class="text-[9px] text-gray-600 uppercase tracking-[0.4em] text-center px-6 leading-relaxed">
            Copyright 2026 © Eloirien. All Rights Reserved.
        </p>
        </footer>
    
</body>
</html>
